# ============================================================
# Agent Orchestration Config
# ============================================================
# All model names, flags, and paths are defined HERE.
# When an agent updates, edit THIS file only — not the scripts.
# ============================================================

# --- Version Compatibility ---
compatibility:
  codex_min: "1.0.0"
  gemini_min: "1.0.0"
  claude_min: "1.0.0"

# --- Model Tiers ---
models:
  codex:
    ultra: "gpt-5.4"              # Architecture analysis, large codebase, complex agentic workflows (1M ctx)
    heavy: "gpt-5.3-codex"        # Complex coding, refactoring, debugging
    light: "gpt-5.3-codex-spark"  # Quick edits, formatting, boilerplate
    mini: "gpt-5-codex-mini"      # Cheap, simple file transforms
  chatgpt:                         # Non-coding tasks via codex CLI (-m flag)
    heavy: "gpt-5.2"              # Document writing, summarization, analysis
    default: "gpt-5.1"            # Data processing, translation, general tasks
    light: "gpt-5"                # Bulk translation, simple transforms
  gemini:
    heavy: "gemini-2.5-pro"       # Deep analysis (max 100/day on Pro plan)
    default: "gemini-2.5-flash"   # Web search, research requiring live data
    light: "gemini-2.5-flash-lite" # Lightweight search tasks
  claude:
    heavy: "opus"                 # Orchestration judgment only
    mid: "sonnet"                 # Code review, code generation (subagent)
    light: "haiku"                # Exploration, classification (subagent)

# --- Reasoning Levels ---
reasoning:
  codex:
    heavy: "extra-high"         # No cost concern — always use best
    light: "high"
    mini: "medium"
  chatgpt:
    ultra: "extra-high"         # gpt-5.4
    heavy: "high"
    default: "medium"
    light: "low"
  gemini:
    # Gemini handles thinking internally; tier determines depth
    heavy: "auto"               # gemini-3-auto decides
    default: "auto"             # gemini-2.5-auto decides
    light: "auto"               # manual model decides
  claude:
    opus: "high"
    sonnet: "medium"            # Default baseline — good balance
    haiku: "low"
    # Cross-tier combos for budget-constrained complex tasks:
    sonnet_high: "high"         # Complex task, opus too expensive
    haiku_medium: "medium"      # Moderate exploration

# --- Complexity Tiers ---
# Claude judges task complexity and selects the matching tier.
# Each tier maps to model + reasoning level per agent.
complexity_tiers:
  low:
    signals: "1-2 files, <10 lines, simple edit or lookup, no reasoning required"
    codex:   { tier: light,  reasoning: high }
    chatgpt: { tier: default, reasoning: low }
    gemini:  { tier: default }
    claude:  { model: haiku,  effort: low }

  medium:
    signals: "3-5 files, new feature, standard coding, clear requirements"
    codex:   { tier: heavy,  reasoning: extra-high }
    chatgpt: { tier: heavy,  reasoning: high }
    gemini:  { tier: default }
    claude:  { model: sonnet, effort: medium }

  high:
    signals: "5+ files, complex bug with unclear root cause, non-trivial refactoring, cross-system changes"
    codex:   { tier: heavy,  reasoning: extra-high }
    chatgpt: { tier: ultra,  reasoning: extra-high }
    gemini:  { tier: heavy }
    claude:  { model: sonnet, effort: high }

  ultra:
    signals: "Full codebase analysis, architecture decisions, novel design, multi-system orchestration"
    codex:   { tier: heavy,  reasoning: extra-high }
    chatgpt: { tier: ultra,  reasoning: extra-high }
    gemini:  { tier: heavy }
    claude:  { model: opus,  effort: high }

# --- CLI Flags ---
flags:
  codex: "--full-auto --sandbox danger-full-access"
  gemini: "--yolo"  # --sandbox removed (requires Docker)
  claude: "--dangerously-skip-permissions"

# --- Paths (auto-detected by sync.sh via OS) ---
paths:
  windows:
    base: "/c/Users/1"
    claude_config: "/c/Users/1/.claude"
    codex_config: "/c/Users/1/.codex"
    gemini_config: "/c/Users/1/.gemini"
  macos:
    base: "$HOME"
    claude_config: "$HOME/.claude"
    codex_config: "$HOME/.codex"
    gemini_config: "$HOME/.gemini"

# --- Usage Limits (reference) ---
limits:
  claude_max_20x:
    window: "5h rolling"
    opus_per_window: 180          # 예상 사용: 월 5-10회 × 100K = 500K-1M
    sonnet_per_window: 900        # 지난 4h: 700K 소모 (과다)
    haiku_per_window: 2700        # 사용 0 (subagent 제거 후)
  chatgpt_pro:
    window: "5h rolling + weekly"
    codex_note: "Codex: 1.8M cached가 recent peak. 캐싱 효율 95%+ 유지."  # 극도로 저활용
  gemini_pro:
    daily_requests: 1500          # 사용: 200/day (13% 미만)
    rpm: 120
    pro_prompts_day: 100
    flash_prompts_day: 300

# --- Fallback Chains ---
fallback:
  code_generation:
    - agent: codex
      model_key: heavy
    - agent: claude_subagent
      model_key: mid
    - action: queue_and_wait

  research:
    - agent: gemini
      model_key: default
    - agent: claude_subagent
      model_key: light
    - agent: codex
      model_key: heavy
    - action: queue_and_wait

  general:                           # Non-coding tasks (writing, data, translation)
    - agent: codex
      model_key: chatgpt.heavy       # o3
    - agent: gemini
      model_key: default
    - action: queue_and_wait

  orchestration:
    - agent: claude
      model_key: heavy
    - agent: claude
      model_key: mid
    - action: pause_and_notify

# --- Rate Limit Thresholds ---
thresholds:
  warn_at: 0.7    # 70% consumed → warning
  switch_at: 0.9  # 90% consumed → auto-switch to lighter model
