<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Dashboard</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#0f3460">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <style>
    :root {
      --bg: #1a1a2e;
      --card: #16213e;
      --accent: #0f3460;
      --highlight: #e94560;
      --text: #eef2ff;
      --muted: #a7b0c0;
      --ok: #4caf50;
      --warn: #ff9800;
      --low: #6abf69;
      --gray: #7d8597;
      --border: rgba(255, 255, 255, 0.12);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 16px;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, sans-serif;
    }

    main {
      max-width: 720px;
      margin: 0 auto;
      display: grid;
      gap: 14px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px;
    }

    h2 {
      margin: 0 0 12px;
      font-size: 1rem;
    }

    .meta {
      color: var(--muted);
      font-size: 0.82rem;
      margin-top: 8px;
      min-height: 1em;
    }

    .device-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .device-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(15, 52, 96, 0.35);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px;
      cursor: pointer;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      display: inline-block;
      margin-right: 8px;
      background: var(--highlight);
    }

    .device-left {
      display: flex;
      align-items: center;
      font-size: 0.92rem;
    }

    .latency {
      color: var(--muted);
      font-size: 0.78rem;
    }

    .task-list {
      display: grid;
      gap: 8px;
    }

    .task-item {
      display: grid;
      grid-template-columns: auto auto 1fr auto auto;
      gap: 8px;
      align-items: center;
      padding: 10px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: rgba(15, 52, 96, 0.22);
      font-size: 0.9rem;
    }

    .task-text.done {
      text-decoration: line-through;
      color: var(--muted);
    }

    .badge {
      border-radius: 999px;
      padding: 2px 8px;
      font-size: 0.72rem;
      white-space: nowrap;
      color: #fff;
    }

    .prio-high { background: #f44336; }
    .prio-mid { background: var(--warn); }
    .prio-low { background: var(--low); }
    .prio-none { background: var(--gray); }

    .tag {
      color: #9fd3ff;
      font-size: 0.78rem;
      white-space: nowrap;
    }

    .btn,
    button,
    select,
    input {
      font: inherit;
    }

    .icon-btn {
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      border-radius: 8px;
      padding: 4px 8px;
    }

    .add-form {
      margin-top: 12px;
      display: grid;
      gap: 8px;
    }

    .add-row {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
    }

    input, select {
      width: 100%;
      border: 1px solid var(--border);
      background: #0e1833;
      color: var(--text);
      border-radius: 8px;
      padding: 10px;
    }

    .btn {
      border: none;
      background: var(--highlight);
      color: #fff;
      border-radius: 8px;
      padding: 10px;
      font-weight: 600;
    }

    .progress-list {
      display: grid;
      gap: 10px;
    }

    .progress-item {
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px;
      background: rgba(15, 52, 96, 0.22);
    }

    .progress-top {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 6px;
      font-size: 0.88rem;
    }

    .bar {
      width: 100%;
      height: 9px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #0f3460, #e94560);
      width: 0;
    }

    .empty {
      color: var(--muted);
      font-size: 0.88rem;
      padding: 6px 2px;
    }

    @media (min-width: 540px) {
      .add-row {
        grid-template-columns: 1fr 110px 120px;
      }
    }
  </style>
</head>
<body>
  <main>
    <section class="card" id="devices-card">
      <h2>🖥 디바이스 상태</h2>
      <div id="devices" class="device-grid"></div>
      <div id="devices-meta" class="meta"></div>
    </section>

    <section class="card">
      <h2>📋 오늘 할일</h2>
      <div id="tasks" class="task-list"></div>
      <form id="add-form" class="add-form">
        <div class="add-row">
          <input id="task-text" type="text" placeholder="할일 입력" required>
          <select id="task-priority">
            <option value="높">높</option>
            <option value="중" selected>중</option>
            <option value="낮">낮</option>
            <option value="-">-</option>
          </select>
          <input id="task-category" type="text" placeholder="category (예: 개발)">
        </div>
        <button class="btn" type="submit">추가</button>
      </form>
      <div id="tasks-meta" class="meta"></div>
    </section>

    <section class="card">
      <h2>📊 프로젝트 진행</h2>
      <div id="projects" class="progress-list"></div>
      <div id="projects-meta" class="meta"></div>
    </section>
  </main>

  <script>
    const devicesEl = document.getElementById('devices');
    const tasksEl = document.getElementById('tasks');
    const projectsEl = document.getElementById('projects');
    const devicesMeta = document.getElementById('devices-meta');
    const tasksMeta = document.getElementById('tasks-meta');
    const projectsMeta = document.getElementById('projects-meta');
    const addForm = document.getElementById('add-form');

    const deviceNames = { m4: 'M4', m1: 'M1', macair: 'Air', windows: 'Win' };

    function esc(text) {
      return String(text || '').replace(/[&<>'"]/g, (c) => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;'
      })[c]);
    }

    function priorityClass(priority) {
      if (priority === '높') return 'prio-high';
      if (priority === '중') return 'prio-mid';
      if (priority === '낮') return 'prio-low';
      return 'prio-none';
    }

    async function fetchJSON(url, options) {
      const res = await fetch(url, options);
      if (!res.ok) {
        const txt = await res.text();
        throw new Error(txt || `HTTP ${res.status}`);
      }
      return res.json();
    }

    async function fetchDevices() {
      devicesMeta.textContent = '로딩 중...';
      try {
        const data = await fetchJSON('/api/devices');
        const keys = ['m4', 'm1', 'macair', 'windows'];
        devicesEl.innerHTML = keys.map((key) => {
          const d = data[key] || { online: false, latency_ms: -1 };
          const color = d.online ? '#4caf50' : '#e94560';
          const latency = d.latency_ms >= 0 ? `${d.latency_ms}ms` : '-';
          return `
            <button class="device-item" type="button" onclick="fetchDevices()">
              <span class="device-left"><span class="dot" style="background:${color}"></span>${deviceNames[key]}</span>
              <span class="latency">${latency}</span>
            </button>
          `;
        }).join('');
        devicesMeta.textContent = `업데이트: ${new Date().toLocaleTimeString()}`;
      } catch (e) {
        devicesMeta.textContent = `오류: ${e.message}`;
      }
    }

    async function fetchTasks() {
      tasksMeta.textContent = '로딩 중...';
      try {
        const data = await fetchJSON('/api/tasks');
        const tasks = data.tasks || [];
        if (!tasks.length) {
          tasksEl.innerHTML = '<div class="empty">표시할 작업이 없습니다.</div>';
        } else {
          tasksEl.innerHTML = tasks.map((task) => {
            const checked = task.status === 'completed' ? 'checked' : '';
            const doneClass = task.status === 'completed' ? 'done' : '';
            return `
              <div class="task-item">
                <input type="checkbox" ${checked} onclick="completeTask('${esc(task.text)}')">
                <span class="badge ${priorityClass(task.priority)}">${esc(task.priority)}</span>
                <span class="task-text ${doneClass}">${esc(task.text)}</span>
                <span class="tag">${esc(task.category)}</span>
                <button class="icon-btn" type="button" onclick="removeTask('${esc(task.text)}')">삭제</button>
              </div>
            `;
          }).join('');
        }
        tasksMeta.textContent = `${tasks.length}개 작업`;
      } catch (e) {
        tasksMeta.textContent = `오류: ${e.message}`;
      }
    }

    async function fetchProjects() {
      projectsMeta.textContent = '로딩 중...';
      try {
        const data = await fetchJSON('/api/projects');
        const entries = Object.entries(data || {});
        if (!entries.length) {
          projectsEl.innerHTML = '<div class="empty">카테고리 데이터가 없습니다.</div>';
        } else {
          projectsEl.innerHTML = entries.map(([category, v]) => `
            <div class="progress-item">
              <div class="progress-top">
                <strong>${esc(category)}</strong>
                <span>${v.completed}/${v.total} 완료 · 진행중 ${v.in_progress}</span>
              </div>
              <div class="bar"><div class="bar-fill" style="width:${Math.max(0, Math.min(100, Number(v.percent) || 0))}%"></div></div>
            </div>
          `).join('');
        }
        projectsMeta.textContent = `${entries.length}개 카테고리`;
      } catch (e) {
        projectsMeta.textContent = `오류: ${e.message}`;
      }
    }

    async function completeTask(taskText) {
      tasksMeta.textContent = '저장 중...';
      try {
        await fetchJSON('/api/tasks/complete', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ task_text: taskText })
        });
        await Promise.all([fetchTasks(), fetchProjects()]);
      } catch (e) {
        tasksMeta.textContent = `오류: ${e.message}`;
      }
    }

    async function addTask(text, priority, category) {
      tasksMeta.textContent = '추가 중...';
      try {
        await fetchJSON('/api/tasks/add', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text, priority, category })
        });
        await Promise.all([fetchTasks(), fetchProjects()]);
      } catch (e) {
        tasksMeta.textContent = `오류: ${e.message}`;
      }
    }

    async function removeTask(taskText) {
      tasksMeta.textContent = '삭제 중...';
      try {
        await fetchJSON('/api/tasks/remove', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ task_text: taskText })
        });
        await Promise.all([fetchTasks(), fetchProjects()]);
      } catch (e) {
        tasksMeta.textContent = `오류: ${e.message}`;
      }
    }

    addForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const textEl = document.getElementById('task-text');
      const prioEl = document.getElementById('task-priority');
      const catEl = document.getElementById('task-category');

      const text = textEl.value.trim();
      const priority = prioEl.value;
      const category = catEl.value.trim() || '미분류';
      if (!text) {
        tasksMeta.textContent = '할일을 입력하세요.';
        return;
      }

      await addTask(text, priority, category);
      textEl.value = '';
      catEl.value = '';
    });

    window.completeTask = completeTask;
    window.removeTask = removeTask;
    window.fetchDevices = fetchDevices;

    fetchDevices();
    fetchTasks();
    fetchProjects();
    setInterval(fetchDevices, 30000);
  </script>
</body>
</html>
