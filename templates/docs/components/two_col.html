<div class="doc-section doc-two-col">
  <h2>{{ heading }}</h2>
  <div class="cols">
    <section class="col">
      <h3>{{ left_heading }}</h3>
      <ul>
{% for item in left_items %}
        <li>{{ item }}</li>
{% endfor %}
      </ul>
    </section>
    <section class="col">
      <h3>{{ right_heading }}</h3>
      <ul>
{% for item in right_items %}
        <li>{{ item }}</li>
{% endfor %}
      </ul>
    </section>
  </div>
</div>
<style>
.doc-two-col .cols {
  display: flex;
  gap: 32px;
}
.doc-two-col .col {
  flex: 1;
  min-width: 0;
}
.doc-two-col .col ul {
  margin: 0;
  padding: 0;
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.doc-two-col .col li {
  position: relative;
  padding-left: 14px;
  font-size: 14px;
  line-height: 1.7;
  color: var(--text-secondary);
  word-break: keep-all;
}
.doc-two-col .col li::before {
  content: "";
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--accent-1);
  position: absolute;
  left: 0;
  top: 8px;
}
</style>
