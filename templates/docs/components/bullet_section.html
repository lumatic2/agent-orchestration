<div class="doc-section doc-bullet-section">
  <h2>{{ heading }}</h2>
  <ul class="bullet-items">
{% for item in items %}
    <li>
      <span class="bullet-dot"></span>
      <div class="bullet-content">
        <p class="item-title">{{ item.title }}</p>
        <p class="item-desc">{{ item.desc }}</p>
      </div>
    </li>
{% endfor %}
  </ul>
</div>
<style>
.doc-bullet-section .bullet-items {
  margin: 0;
  padding: 0;
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 14px;
}
.doc-bullet-section .bullet-items li {
  display: flex;
  align-items: flex-start;
  gap: 12px;
}
.doc-bullet-section .bullet-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--accent-1);
  margin-top: 8px;
  flex: 0 0 8px;
}
.doc-bullet-section .bullet-content {
  min-width: 0;
}
.doc-bullet-section .item-title {
  margin: 0;
  font-size: 14px;
  line-height: 1.65;
  color: var(--text-primary);
  font-weight: 700;
}
.doc-bullet-section .item-desc {
  margin: 3px 0 0;
  font-size: 13px;
  line-height: 1.65;
  color: var(--text-muted);
}
.doc-bullet-section .item-desc:empty {
  display: none;
}
</style>
