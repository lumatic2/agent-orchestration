<div class="slide-inner bar-chart-slide">
  <div class="left">
    <div class="badge">{{ badge }}</div>
    <h2>{{ title }}</h2>
    <div class="bars">
{% for bar in bars %}
      <div class="bar-row">
        <div class="row-top">
          <span class="label">{{ bar.label }}</span>
          <span class="value">{{ bar.value }}</span>
        </div>
        <div class="bar-track">
          <div class="bar-fill" style="width: {{ bar.width_percent }}%;"></div>
        </div>
      </div>
{% endfor %}
    </div>
  </div>
  <div class="right-panel">
    <div class="hero-number">{{ hero_number }}</div>
    <div class="hero-label">{{ hero_label }}</div>
    <div class="stats">
{% for stat in sub_stats %}
      <div class="stat">
        <div class="s-label">{{ stat.label }}</div>
        <div class="s-value">{{ stat.value }}</div>
      </div>
{% endfor %}
    </div>
  </div>
</div>
<style>
.bar-chart-slide {
  display: flex;
}
.bar-chart-slide .left {
  width: 72%;
  padding: 56px 56px 50px;
  display: flex;
  flex-direction: column;
}
.bar-chart-slide .left h2 {
  margin: 16px 0 22px;
  font-size: 30px;
  line-height: 1.3;
  font-weight: 800;
}
.bar-chart-slide .bars {
  display: flex;
  flex-direction: column;
  gap: 14px;
}
.bar-chart-slide .bar-row {
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.bar-chart-slide .row-top {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
}
.bar-chart-slide .label {
  font-size: 15px;
  color: var(--text-secondary);
}
.bar-chart-slide .value {
  font-size: 14px;
  color: var(--text-muted);
}
.bar-chart-slide .bar-track {
  width: 100%;
  height: 14px;
  border-radius: 999px;
  background: #EAF1FF;
  overflow: hidden;
}
.bar-chart-slide .bar-fill {
  height: 100%;
  border-radius: 999px;
  background: linear-gradient(90deg, var(--accent-1), var(--accent-dark));
}
.bar-chart-slide .right-panel {
  width: 28%;
  background: var(--accent-1);
  color: var(--bg-white);
  padding: 52px 32px;
  display: flex;
  flex-direction: column;
  justify-content: center;
}
.bar-chart-slide .hero-number {
  font-size: 80px;
  line-height: 1;
  font-weight: 900;
}
.bar-chart-slide .hero-label {
  margin-top: 10px;
  font-size: 18px;
  line-height: 1.45;
  color: rgba(255, 255, 255, 0.9);
}
.bar-chart-slide .stats {
  margin-top: 24px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.bar-chart-slide .stat {
  padding-top: 10px;
  border-top: 1px solid rgba(255, 255, 255, 0.25);
}
.bar-chart-slide .s-label {
  font-size: 13px;
  color: rgba(255, 255, 255, 0.8);
}
.bar-chart-slide .s-value {
  margin-top: 2px;
  font-size: 20px;
  font-weight: 700;
}
</style>
