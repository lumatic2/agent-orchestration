<div class="slide-inner numbered-list-slide">
  <div class="left">
    <div class="badge">{{ badge }}</div>
    <h2>{{ title }}</h2>
    <p class="subtitle">{{ subtitle }}</p>
  </div>
  <div class="divider"></div>
  <div class="right">
{% for item in items %}
    <div class="entry">
      <div class="num">{{ item.num }}</div>
      <div class="body">
        <h3>{{ item.title }}</h3>
        <p>{{ item.desc }}</p>
      </div>
    </div>
{% endfor %}
  </div>
</div>
<style>
.numbered-list-slide {
  display: flex;
  padding: 58px 64px;
  gap: 30px;
}
.numbered-list-slide .left {
  width: 55%;
  display: flex;
  flex-direction: column;
  justify-content: center;
}
.numbered-list-slide .left h2 {
  margin: 16px 0 12px;
  font-size: 32px;
  line-height: 1.3;
  font-weight: 800;
}
.numbered-list-slide .left .subtitle {
  margin: 0;
  color: var(--text-secondary);
  font-size: 18px;
  line-height: 1.65;
}
.numbered-list-slide .divider {
  width: 1px;
  background: var(--border);
}
.numbered-list-slide .right {
  width: 45%;
  display: flex;
  flex-direction: column;
  justify-content: center;
}
.numbered-list-slide .entry {
  display: flex;
  gap: 14px;
  padding: 14px 0;
  border-bottom: 1px solid var(--border);
}
.numbered-list-slide .entry:last-child {
  border-bottom: 0;
}
.numbered-list-slide .num {
  min-width: 42px;
  color: var(--accent-1);
  font-size: 26px;
  line-height: 1;
  font-weight: 800;
}
.numbered-list-slide .entry h3 {
  margin: 0 0 6px;
  font-size: 20px;
  line-height: 1.35;
}
.numbered-list-slide .entry p {
  margin: 0;
  font-size: 14px;
  line-height: 1.6;
  color: var(--text-secondary);
}
</style>
