<div class="slide-inner comparison-table-slide">
  <div class="header-block">
    <div class="badge">{{ badge }}</div>
    <h2>{{ title }}</h2>
  </div>
  <div class="table-wrap">
    <div class="thead">
      <div class="col aspect-col">항목</div>
      <div class="col left-col">{{ left_label }}</div>
      <div class="col right-col">{{ right_label }}</div>
    </div>
{% for row in rows %}
    <div class="tr">
      <div class="col aspect-col">{{ row.aspect }}</div>
      <div class="col left-col {{ row.left_class }}">{{ row.left }}</div>
      <div class="col right-col {{ row.right_class }}">{{ row.right }}</div>
    </div>
{% endfor %}
  </div>
</div>
<style>
.comparison-table-slide {
  padding: 52px 64px;
}
.comparison-table-slide h2 {
  margin: 14px 0 20px;
  font-size: 28px;
  line-height: 1.3;
  font-weight: 800;
}
.comparison-table-slide .table-wrap {
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
}
.comparison-table-slide .thead,
.comparison-table-slide .tr {
  display: grid;
  grid-template-columns: 28% 36% 36%;
}
.comparison-table-slide .col {
  padding: 14px 16px;
  border-right: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  font-size: 14px;
  line-height: 1.55;
}
.comparison-table-slide .col:last-child {
  border-right: 0;
}
.comparison-table-slide .thead .col {
  font-size: 15px;
  font-weight: 700;
}
.comparison-table-slide .thead .aspect-col {
  background: #F3F4F6;
}
.comparison-table-slide .thead .left-col {
  background: var(--bg-white);
}
.comparison-table-slide .thead .right-col {
  background: var(--accent-1);
  color: var(--bg-white);
}
.comparison-table-slide .tr .aspect-col {
  background: #F9FAFB;
  color: var(--text-secondary);
  font-weight: 600;
}
.comparison-table-slide .tr:last-child .col {
  border-bottom: 0;
}
.comparison-table-slide .highlight {
  color: var(--accent-1);
  font-weight: 800;
}
</style>
