<div class="slide-inner title-panel">
  <div class="left-panel">
    <h1>{{ title }}</h1>
    <p class="subtitle">{{ subtitle }}</p>
  </div>
  <div class="right-content">
    <ul class="point-list">
{% for point in points %}
      <li>
        <span class="bullet">✓</span>
        <span>{{ point }}</span>
      </li>
{% endfor %}
    </ul>
  </div>
</div>
<style>
.title-panel {
  display: flex;
}
.title-panel .left-panel {
  width: 35%;
  background: var(--accent-1);
  color: var(--bg-white);
  padding: 76px 56px;
  display: flex;
  flex-direction: column;
  justify-content: center;
}
.title-panel .left-panel h1 {
  margin: 0;
  font-size: 40px;
  line-height: 1.25;
  font-weight: 800;
}
.title-panel .left-panel .subtitle {
  margin: 20px 0 0;
  font-size: 16px;
  line-height: 1.6;
  color: #BBDEFB;
}
.title-panel .right-content {
  width: 65%;
  background: var(--bg-white);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 70px;
}
.title-panel .point-list {
  margin: 0;
  padding: 0;
  list-style: none;
  width: 100%;
  max-width: 650px;
  display: flex;
  flex-direction: column;
  gap: 22px;
}
.title-panel .point-list li {
  display: flex;
  align-items: flex-start;
  gap: 14px;
  font-size: 23px;
  line-height: 1.45;
  font-weight: 600;
  color: var(--text-primary);
}
.title-panel .point-list .bullet {
  color: var(--accent-1);
  font-size: 26px;
  line-height: 1;
  margin-top: 2px;
}
</style>
