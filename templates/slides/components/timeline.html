<div class="slide-inner timeline-slide">
  <div class="head">
    <div class="badge">{{ badge }}</div>
    <h2>{{ title }}</h2>
  </div>
  <div class="timeline">
{% for step in steps %}
    <div class="step">
      <div class="rail">
        <div class="node"></div>
      </div>
      <div class="content">
        <div class="year">{{ step.year }}</div>
        <h3>{{ step.title }}</h3>
        <p>{{ step.desc }}</p>
      </div>
    </div>
{% endfor %}
  </div>
</div>
<style>
.timeline-slide {
  padding: 54px 68px;
}
.timeline-slide h2 {
  margin: 14px 0 18px;
  font-size: 28px;
  line-height: 1.3;
  font-weight: 800;
}
.timeline-slide .timeline {
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.timeline-slide .step {
  display: flex;
  gap: 16px;
  min-height: 98px;
}
.timeline-slide .rail {
  width: 30px;
  display: flex;
  justify-content: center;
  position: relative;
}
.timeline-slide .rail::before {
  content: "";
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
  top: 0;
  bottom: 0;
  width: 2px;
  background: var(--accent-1);
}
.timeline-slide .step:last-child .rail::before {
  bottom: 50%;
}
.timeline-slide .node {
  width: 14px;
  height: 14px;
  border-radius: 50%;
  background: var(--accent-1);
  border: 2px solid var(--bg-white);
  margin-top: 8px;
  position: relative;
  z-index: 1;
}
.timeline-slide .content {
  flex: 1;
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px 16px;
}
.timeline-slide .year {
  color: var(--accent-1);
  font-size: 14px;
  font-weight: 800;
}
.timeline-slide .content h3 {
  margin: 6px 0 4px;
  font-size: 18px;
  line-height: 1.35;
}
.timeline-slide .content p {
  margin: 0;
  color: var(--text-muted);
  font-size: 14px;
  line-height: 1.55;
}
</style>
