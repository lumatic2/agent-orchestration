<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SCHEDULE Dashboard</title>
  <style>
    :root {
      --bg: #f3f5f9;
      --card: #ffffff;
      --line: #d6dce8;
      --text: #1e2430;
      --muted: #6b7280;
      --accent: #1f6feb;
      --p-high: #d92d20;
      --p-mid: #f59e0b;
      --p-low: #16a34a;
      --p-none: #6b7280;
      --inprogress: #e8f1ff;
      --done: #8b95a7;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Pretendard", "Noto Sans KR", "Apple SD Gothic Neo", sans-serif;
      background: linear-gradient(180deg, #f6f8fc 0%, #edf2f9 100%);
      color: var(--text);
    }

    .page {
      max-width: 1280px;
      margin: 0 auto;
      padding: 14px;
      display: grid;
      gap: 12px;
    }

    .panel {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px;
    }

    .row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    .title {
      margin: 0;
      font-size: 20px;
      font-weight: 700;
      margin-right: auto;
    }

    button, select, input {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--text);
      border-radius: 8px;
      padding: 9px 10px;
      font-size: 14px;
    }

    button {
      cursor: pointer;
      min-height: 38px;
    }

    button.primary {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    .view-wrap {
      display: flex;
      gap: 6px;
    }

    .view-wrap button.active {
      background: #e8f0ff;
      border-color: #afc6ff;
      color: #1849a9;
      font-weight: 700;
    }

    .filters {
      display: grid;
      grid-template-columns: repeat(4, minmax(160px, 1fr));
      gap: 8px;
    }

    .filters label {
      font-size: 12px;
      color: var(--muted);
      display: grid;
      gap: 4px;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .column {
      background: #f9fbff;
      border: 1px solid var(--line);
      border-radius: 10px;
      min-height: 320px;
      display: flex;
      flex-direction: column;
    }

    .column h3 {
      margin: 0;
      padding: 10px;
      border-bottom: 1px solid var(--line);
      font-size: 15px;
    }

    .tasks {
      padding: 8px;
      display: grid;
      gap: 8px;
    }

    .task {
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 10px;
      padding: 8px;
      display: grid;
      gap: 8px;
    }

    .task.inprogress {
      background: var(--inprogress);
    }

    .task.done {
      opacity: 0.65;
    }

    .task.done .task-content {
      text-decoration: line-through;
      color: var(--done);
    }

    .task-top {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .task-content {
      font-size: 14px;
      line-height: 1.4;
      word-break: break-word;
    }

    .tagline {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      align-items: center;
      color: var(--muted);
      font-size: 12px;
    }

    .badge {
      border-radius: 99px;
      padding: 2px 8px;
      font-size: 11px;
      font-weight: 700;
      color: #fff;
    }

    .priority-high { background: var(--p-high); }
    .priority-mid { background: var(--p-mid); }
    .priority-low { background: var(--p-low); }
    .priority-none { background: var(--p-none); }

    .deadline {
      border-radius: 99px;
      background: #eef2ff;
      color: #2c3d7e;
      padding: 2px 8px;
      font-size: 11px;
      font-weight: 600;
    }

    .task-actions {
      margin-left: auto;
      display: flex;
      gap: 6px;
    }

    .task-actions button {
      padding: 6px 8px;
      min-height: 30px;
      font-size: 12px;
    }

    .list-wrap { display: none; }

    .tabs {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }

    .tabs button.active {
      background: #eff6ff;
      border-color: #b7d0ff;
      color: #1e40af;
      font-weight: 700;
    }

    .list-table {
      display: grid;
      gap: 8px;
    }

    .list-item {
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fff;
      padding: 10px;
      display: grid;
      gap: 8px;
    }

    .list-item.inprogress { background: var(--inprogress); }
    .list-item.done .task-content { text-decoration: line-through; color: var(--done); }

    .edit-row {
      display: grid;
      grid-template-columns: 1fr 120px 120px 120px auto;
      gap: 6px;
    }

    .empty {
      color: var(--muted);
      text-align: center;
      padding: 18px 8px;
      font-size: 13px;
    }

    .note {
      color: var(--muted);
      font-size: 12px;
    }

    @media (max-width: 900px) {
      .board { grid-template-columns: 1fr; }
      .filters { grid-template-columns: repeat(2, minmax(130px, 1fr)); }
      .edit-row { grid-template-columns: 1fr 1fr; }
    }

    @media (max-width: 540px) {
      .page { padding: 8px; }
      .filters { grid-template-columns: 1fr; }
      button, select, input { font-size: 15px; min-height: 42px; }
      .task-actions button { min-height: 34px; }
      .title { font-size: 18px; }
    }
  </style>
</head>
<body>
  <div class="page">
    <section class="panel row">
      <h1 class="title">SCHEDULE Dashboard</h1>
      <div class="view-wrap">
        <button id="btnKanban" class="active" type="button">Kanban</button>
        <button id="btnList" type="button">List</button>
      </div>
      <button id="btnRefresh" type="button">새로고침</button>
      <button id="btnSync" type="button">git pull</button>
    </section>

    <section class="panel filters">
      <label>카테고리 필터
        <select id="filterCategory">
          <option value="all">전체</option>
          <option value="#회사">#회사</option>
          <option value="#개발">#개발</option>
          <option value="#학습">#학습</option>
          <option value="#크리에이티브">#크리에이티브</option>
          <option value="#라이프">#라이프</option>
          <option value="#노션">#노션</option>
        </select>
      </label>
      <label>우선순위 필터
        <select id="filterPriority">
          <option value="all">전체</option>
          <option value="높">높</option>
          <option value="중">중</option>
          <option value="낮">낮</option>
          <option value="-">-</option>
        </select>
      </label>
      <label>완료 숨김
        <select id="filterDone">
          <option value="0">표시</option>
          <option value="1">숨김</option>
        </select>
      </label>
      <div class="note" id="statusBox">로딩 중...</div>
    </section>

    <section class="panel">
      <form id="addForm" class="row">
        <select id="addSection" required>
          <option value="today">오늘</option>
          <option value="deadline">마감 있음</option>
          <option value="anytime">언제든</option>
        </select>
        <select id="addPriority">
          <option value="-">-</option>
          <option value="높">높</option>
          <option value="중" selected>중</option>
          <option value="낮">낮</option>
        </select>
        <select id="addCategory">
          <option value="">카테고리 없음</option>
          <option value="#회사">#회사</option>
          <option value="#개발">#개발</option>
          <option value="#학습">#학습</option>
          <option value="#크리에이티브">#크리에이티브</option>
          <option value="#라이프">#라이프</option>
          <option value="#노션">#노션</option>
        </select>
        <input id="addDeadline" placeholder="마감 (예: 03-24(화) 16:00)" />
        <input id="addContent" placeholder="새 작업 내용" required style="flex:1; min-width:220px;" />
        <button class="primary" type="submit">추가</button>
      </form>
    </section>

    <section id="kanbanWrap" class="panel">
      <div class="board">
        <div class="column"><h3>오늘</h3><div id="colToday" class="tasks"></div></div>
        <div class="column"><h3>마감 있음</h3><div id="colDeadline" class="tasks"></div></div>
        <div class="column"><h3>언제든</h3><div id="colAnytime" class="tasks"></div></div>
      </div>
    </section>

    <section id="listWrap" class="panel list-wrap">
      <div id="listTabs" class="tabs"></div>
      <div id="listTable" class="list-table"></div>
    </section>
  </div>

  <script>
    const STATE = {
      tasks: [],
      view: 'kanban',
      tab: '#회사',
      editingId: null,
    };

    const sectionName = {
      today: '오늘',
      deadline: '마감 있음',
      anytime: '언제든',
    };

    const categories = ['#회사', '#개발', '#학습', '#크리에이티브', '#라이프'];

    function priorityClass(priority) {
      if (priority === '높') return 'priority-high';
      if (priority === '중') return 'priority-mid';
      if (priority === '낮') return 'priority-low';
      return 'priority-none';
    }

    function applyFilters(tasks) {
      const c = document.getElementById('filterCategory').value;
      const p = document.getElementById('filterPriority').value;
      const hideDone = document.getElementById('filterDone').value === '1';

      return tasks.filter((t) => {
        if (c !== 'all' && (t.category || '') !== c) return false;
        if (p !== 'all' && t.priority !== p) return false;
        if (hideDone && t.status === 'x') return false;
        return true;
      });
    }

    function esc(value) {
      return String(value || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function taskCard(task, compact = false) {
      const inprogress = task.status === '/';
      const done = task.status === 'x';
      const checked = done ? '☑' : (inprogress ? '◪' : '☐');
      const cls = `${inprogress ? 'inprogress' : ''} ${done ? 'done' : ''}`.trim();

      if (String(task.id) === String(STATE.editingId)) {
        return `
          <div class="${compact ? 'list-item' : 'task'} ${cls}">
            <div class="edit-row">
              <input id="editContent" value="${esc(task.content)}" />
              <input id="editDeadline" value="${esc(task.deadline || '')}" placeholder="마감" />
              <select id="editPriority">
                <option value="높" ${task.priority === '높' ? 'selected' : ''}>높</option>
                <option value="중" ${task.priority === '중' ? 'selected' : ''}>중</option>
                <option value="낮" ${task.priority === '낮' ? 'selected' : ''}>낮</option>
                <option value="-" ${task.priority === '-' ? 'selected' : ''}>-</option>
              </select>
              <select id="editCategory">
                <option value="" ${(task.category || '') === '' ? 'selected' : ''}>없음</option>
                <option value="#회사" ${task.category === '#회사' ? 'selected' : ''}>#회사</option>
                <option value="#개발" ${task.category === '#개발' ? 'selected' : ''}>#개발</option>
                <option value="#학습" ${task.category === '#학습' ? 'selected' : ''}>#학습</option>
                <option value="#크리에이티브" ${task.category === '#크리에이티브' ? 'selected' : ''}>#크리에이티브</option>
                <option value="#라이프" ${task.category === '#라이프' ? 'selected' : ''}>#라이프</option>
                <option value="#노션" ${task.category === '#노션' ? 'selected' : ''}>#노션</option>
              </select>
              <div class="row">
                <button type="button" onclick="saveEdit('${task.id}')">저장</button>
                <button type="button" onclick="cancelEdit()">취소</button>
              </div>
            </div>
          </div>`;
      }

      return `
        <div class="${compact ? 'list-item' : 'task'} ${cls}">
          <div class="task-top">
            <button type="button" title="상태 순환" onclick="toggleTask('${task.id}')">${checked}</button>
            <div class="task-content">${esc(task.content)}</div>
            <div class="task-actions">
              <button type="button" onclick="startEdit('${task.id}')">수정</button>
              <button type="button" onclick="deleteTask('${task.id}')">삭제</button>
            </div>
          </div>
          <div class="tagline">
            <span class="badge ${priorityClass(task.priority)}">${esc(task.priority)}</span>
            ${task.deadline ? `<span class="deadline">${esc(task.deadline)}</span>` : ''}
            ${task.category ? `<span>${esc(task.category)}</span>` : ''}
            ${compact ? `<span>${esc(sectionName[task.section])}</span>` : ''}
          </div>
        </div>`;
    }

    function renderKanban(tasks) {
      const cols = {
        today: document.getElementById('colToday'),
        deadline: document.getElementById('colDeadline'),
        anytime: document.getElementById('colAnytime'),
      };

      Object.values(cols).forEach((el) => el.innerHTML = '');
      const grouped = { today: [], deadline: [], anytime: [] };
      tasks.forEach((t) => grouped[t.section]?.push(t));

      Object.entries(grouped).forEach(([key, arr]) => {
        cols[key].innerHTML = arr.length
          ? arr.map((t) => taskCard(t)).join('')
          : '<div class="empty">작업 없음</div>';
      });
    }

    function renderTabs() {
      const html = categories.map((cat) =>
        `<button type="button" class="${STATE.tab === cat ? 'active' : ''}" onclick="setTab('${cat}')">${cat}</button>`
      ).join('');
      document.getElementById('listTabs').innerHTML = html;
    }

    function renderList(tasks) {
      renderTabs();
      const inTab = tasks.filter((t) => (t.category || '') === STATE.tab);
      document.getElementById('listTable').innerHTML = inTab.length
        ? inTab.map((t) => taskCard(t, true)).join('')
        : '<div class="empty">해당 카테고리 작업 없음</div>';
    }

    function render() {
      const filtered = applyFilters(STATE.tasks);
      if (STATE.view === 'kanban') {
        document.getElementById('kanbanWrap').style.display = 'block';
        document.getElementById('listWrap').style.display = 'none';
        renderKanban(filtered);
      } else {
        document.getElementById('kanbanWrap').style.display = 'none';
        document.getElementById('listWrap').style.display = 'block';
        renderList(filtered);
      }
    }

    async function loadTasks() {
      try {
        const res = await fetch('/api/tasks');
        const data = await res.json();
        STATE.tasks = data.tasks || [];
        document.getElementById('statusBox').textContent = `총 ${STATE.tasks.length}개 작업 · ${data.updated_at || ''}`;
        render();
      } catch (e) {
        document.getElementById('statusBox').textContent = `로드 실패: ${e}`;
      }
    }

    async function apiWrite(url, method, body) {
      const res = await fetch(url, {
        method,
        headers: { 'Content-Type': 'application/json' },
        body: body ? JSON.stringify(body) : undefined,
      });
      if (!res.ok) {
        const txt = await res.text();
        throw new Error(txt || 'request failed');
      }
      return res.json();
    }

    async function toggleTask(id) {
      await apiWrite(`/api/tasks/${id}`, 'PUT', { action: 'toggle' });
      STATE.editingId = null;
      await loadTasks();
    }

    async function deleteTask(id) {
      if (!confirm('삭제할까요?')) return;
      await apiWrite(`/api/tasks/${id}`, 'DELETE');
      if (String(STATE.editingId) === String(id)) STATE.editingId = null;
      await loadTasks();
    }

    function startEdit(id) {
      STATE.editingId = id;
      render();
    }

    function cancelEdit() {
      STATE.editingId = null;
      render();
    }

    async function saveEdit(id) {
      const content = document.getElementById('editContent')?.value?.trim();
      const deadline = document.getElementById('editDeadline')?.value?.trim() || '';
      const priority = document.getElementById('editPriority')?.value;
      const category = document.getElementById('editCategory')?.value || null;
      if (!content) {
        alert('내용은 필수입니다.');
        return;
      }
      await apiWrite(`/api/tasks/${id}`, 'PUT', { content, deadline, priority, category });
      STATE.editingId = null;
      await loadTasks();
    }

    async function submitAdd(event) {
      event.preventDefault();
      const payload = {
        section: document.getElementById('addSection').value,
        priority: document.getElementById('addPriority').value,
        category: document.getElementById('addCategory').value || null,
        deadline: document.getElementById('addDeadline').value.trim(),
        content: document.getElementById('addContent').value.trim(),
      };
      if (!payload.content) return;
      await apiWrite('/api/tasks', 'POST', payload);
      document.getElementById('addContent').value = '';
      document.getElementById('addDeadline').value = '';
      await loadTasks();
    }

    function setTab(tab) {
      STATE.tab = tab;
      render();
    }

    async function manualSync() {
      const res = await fetch('/api/sync', { method: 'POST' });
      const data = await res.json();
      document.getElementById('statusBox').textContent = data.ok ? `git pull 완료: ${data.output}` : `git pull 실패: ${data.output}`;
      await loadTasks();
    }

    function bindEvents() {
      document.getElementById('btnKanban').addEventListener('click', () => {
        STATE.view = 'kanban';
        document.getElementById('btnKanban').classList.add('active');
        document.getElementById('btnList').classList.remove('active');
        render();
      });
      document.getElementById('btnList').addEventListener('click', () => {
        STATE.view = 'list';
        document.getElementById('btnList').classList.add('active');
        document.getElementById('btnKanban').classList.remove('active');
        render();
      });
      document.getElementById('btnRefresh').addEventListener('click', loadTasks);
      document.getElementById('btnSync').addEventListener('click', manualSync);
      document.getElementById('addForm').addEventListener('submit', submitAdd);

      ['filterCategory', 'filterPriority', 'filterDone'].forEach((id) => {
        document.getElementById(id).addEventListener('change', render);
      });

      window.toggleTask = toggleTask;
      window.deleteTask = deleteTask;
      window.startEdit = startEdit;
      window.cancelEdit = cancelEdit;
      window.saveEdit = saveEdit;
      window.setTab = setTab;
    }

    bindEvents();
    loadTasks();
  </script>
</body>
</html>
