# ── 슬라이드 생성 설정 ──────────────────────────────────────────────
# Claude가 슬라이드 HTML을 생성할 때 참조하는 기본값
# 이 파일을 수정하면 다음 세션부터 반영됨

# ── 기본형 템플릿 (slides-upgraded-sample 기준) ──────────────────────
# 모든 슬라이드는 이 기본형을 바탕으로 생성됨
# 원본 PDF: ~/Desktop/slides-upgraded-sample.pdf (보존 불필요 — 이 파일에 완전 기록됨)
base_template:
  name: "slides-upgraded-sample"
  description: "포트폴리오 컬러 기반 기본 슬라이드 시스템 (A/B/C 3원칙)"
  slide_types:
    title_left_panel:
      desc: "좌측 파란 패널(~35%) + 우측 흰 배경 + 아이콘 리스트"
      panel_width: "35%"
      panel_bg: "var(--accent-1)"   # #2563EB
      right_bg: "#FFFFFF"
      usage: "표지 슬라이드"
    content_white:
      desc: "풀 화이트 배경, 섹션 배지(태그) + 좌상단 제목 + 본문"
      badge_style: "border: 1.5px solid var(--accent-1); color: var(--accent-1); border-radius: 6px; padding: 4px 12px; font-size: 12px; letter-spacing: 0.08em"
      usage: "일반 콘텐츠, 아이콘 카드, 설명 슬라이드"
    asymmetric_left:
      desc: "좌측 핵심 콘텐츠(+숫자/배지) + 구분선 + 우측 번호 리스트"
      divider: "1px solid var(--border)"
      list_style: "번호(01/02/03) + 제목 + 설명, 구분선으로 항목 분리"
      usage: "이유/원칙/단계 설명"
    right_accent_panel:
      desc: "좌 콘텐츠(바 차트 등) + 우측 파란 accent 패널(~28%)"
      right_panel_bg: "var(--accent-1)"
      right_panel_content: "hero 숫자(80px+) + 소제목 + 보조 지표 2~3개"
      usage: "수치/데이터 강조 슬라이드"
    big_statement_white:
      desc: "화이트 배경, 3색 타이포 계층 (dark/blue/muted)"
      line1_color: "var(--text-primary)"   # 진한 — 도입어
      line2_color: "var(--accent-1)"       # 파란 — 핵심 강조
      line3_color: "var(--text-muted)"     # 회색  — ghost 마무리
      badge: "좌상단 라인(——) + 섹션명 배지"
      usage: "핵심 메시지 전달"
    full_accent_bg:
      desc: "풀 파란 배경 + 흰 텍스트 + 따옴표 SVG 장식"
      bg: "var(--accent-1)"
      usage: "인용구, 마무리 슬라이드"

# ── 컬러 정책 ────────────────────────────────────────────────────────
color_policy:
  default: base                  # 기본은 항상 base_template 컬러(포트폴리오 시스템) 사용
  override_trigger: "명시적 요청"  # "주제에 어울리는 컬러로" 또는 특정 색상 지정 시에만 변경
  override_examples:
    - "미쉐린 가이드 → 다크+골드 (#0F172A, #C9A84C)"
    - "자연/환경 → 그린 계열"
    - "금융/신뢰 → 네이비 계열"
  note: "컬러 오버라이드 시에도 레이아웃·타이포·SVG 규칙은 base_template 동일 적용"

# ── 색상 사용 원칙 (웹 리서치 기반, 2026-03-06) ─────────────────────
color_rules:

  # ── 1. 60-30-10 배분 규칙 ──────────────────────────────────────────
  ratio_rule:
    primary_60: "배경 및 넓은 면적 → 분위기·톤 결정"
    secondary_30: "제목·본문·큰 차트 요소 → 콘텐츠 구성"
    accent_10: "핵심 메시지·아이콘·데이터 포인트 → 시선 집중"
    hard_limits:
      - "강조색(accent)은 슬라이드당 1개만. 2개 이상 금지."
      - "색상 종류 총 3~4개 초과 금지 (배경/텍스트/강조/보조 최대)"
      - "강조색이 배경 면적의 20% 초과 시 임팩트 소멸"

  # ── 2. WCAG 대비율 기준 (AP-17 확장판) ────────────────────────────
  contrast_rules:
    normal_text:   "4.5:1 이상 (18pt 미만 텍스트)"
    large_text:    "3:1 이상 (18pt 이상 또는 14pt Bold)"
    ui_elements:   "3:1 이상 (아이콘, 차트 선, 구분선)"
    forbidden:
      - "색상만으로 정보 전달 금지 → 굵기·아이콘·언더라인 병행"
      - "색상 진동 금지: 채도 높은 보색 직접 인접 (빨강배경+초록텍스트)"
      - "이미지 위 텍스트 직배치 금지 → 반투명 오버레이(rgba 0.5+) 필수"
    dark_theme_accent_min: "다크 배경 위 강조색은 배경 대비 4.5:1 이상 확보"

  # ── 3. 다크 vs 라이트 선택 기준 ───────────────────────────────────
  theme_selection:
    use_dark:
      - "어두운 강당·영화관·웨비나 발표 환경"
      - "비주얼·감성·브랜드 중심 콘텐츠"
      - "이미지·영상 삽입이 많은 슬라이드"
      - "힙합·나이트라이프·럭셔리·우주 등 다크 분위기 주제"
    use_light:
      - "밝은 사무실·회의실 발표 환경"
      - "텍스트·데이터 정보 전달 중심"
      - "인쇄 배포 예정인 슬라이드"
      - "비즈니스·교육·리포트 등 일반 주제"
    dark_palette_guide:
      bg:      "#0F172A ~ #1A1A1A  (딥블랙 계열)"
      text:    "#E0E0E0 ~ #F8F8F2  (밝은 회색~흰색)"
      accent:  "채도 높고 밝은 색 권장 (예: #8B5CF6 퍼플, #D97706 앰버, #10B981 에메랄드)"
      border:  "rgba(255,255,255,0.08~0.15)  ← AP-17 준수"
    light_palette_guide:
      bg:      "#FFFFFF ~ #F8F8F8  (흰색~밝은 회색)"
      text:    "#111827 ~ #333333  (딥차콜~어두운 회색)"
      accent:  "브랜드 컬러 또는 중간 채도 (예: #2563EB 블루, #DC2626 레드)"
      border:  "#E5E7EB ~ #D1D5DB  (밝은 회색)"

  # ── 4. 주제별 색상 심리 매핑 ──────────────────────────────────────
  psychological_mapping:
    # 주제 키워드 → 권장 accent 색상
    trust_finance_tech:
      keywords: ["금융", "기업", "기술", "신뢰", "전문성"]
      accent: "#2563EB ~ #1E90FF  (파랑 계열)"
      avoid: "빨강 (손실 연상)"
    energy_urgency:
      keywords: ["스포츠", "경쟁", "긴급", "에너지", "열정"]
      accent: "#DC2626 ~ #FF4500  (레드~오렌지)"
      note: "재무 슬라이드에서 빨강=손실 혼동 주의 → #FF6347 주황빛으로 대체"
    growth_nature:
      keywords: ["환경", "성장", "지속가능성", "건강", "자연"]
      accent: "#059669 ~ #28A745  (그린 계열)"
    creative_premium:
      keywords: ["럭셔리", "뮤직", "아트", "힙합", "패션"]
      accent: "#8B5CF6 ~ #7C3AED  (퍼플) or #D97706 (앰버골드)"
    optimism_warmth:
      keywords: ["음식", "여행", "라이프스타일", "커피", "요리"]
      accent: "#D97706 ~ #F59E0B  (앰버~골드) or #EF4444 (웜레드)"
    neutral_information:
      keywords: ["교육", "리서치", "분석", "보고서"]
      accent: "#374151 ~ #4B5563  (딥그레이) + 포인트컬러 1개"

  # ── 5. 자주 하는 색상 실수 (NG 목록) ──────────────────────────────
  common_mistakes:
    - id: CM-01
      mistake: "파스텔 계열을 배경이 아닌 강조색으로 사용"
      why_bad: "다크/중간 배경 위에서 시인성 소멸. AP-07 참조."
      fix: "강조색은 원색 또는 선명한 색 사용. 연하게 쓰려면 텍스트만 lighten."
    - id: CM-02
      mistake: "노란색을 배경 또는 큰 면적에 사용"
      why_bad: "눈 피로 극심. 노랑은 항상 소량(10% 이하) 강조에만."
      fix: "노랑/금색은 아이콘·수치·배지 등 포인트 요소에만 사용."
    - id: CM-03
      mistake: "무채색(회색) 텍스트를 흰 배경에 너무 연하게 사용"
      why_bad: "4.5:1 미달 → 가독성 저하. text-muted 남용."
      fix: "보조 텍스트 최소 #6B7280 (흰배경 기준 4.6:1 통과)."
    - id: CM-04
      mistake: "슬라이드마다 다른 강조색 사용"
      why_bad: "덱 전체 일관성 파괴. 브랜드 인식 약화."
      fix: "강조색은 덱 전체에서 1개 고정. 변형은 명도/채도 조절만."
    - id: CM-05
      mistake: "그라디언트를 텍스트 색상으로 남용"
      why_bad: "가독성 저하, 인쇄 시 깨짐. 특수 효과처럼 보여 진부함."
      fix: "그라디언트 텍스트는 덱당 최대 1~2곳(제목·결론 슬라이드)만."

# 출력 경로
# 최종 PDF 저장 위치
output_dir: ~/Desktop

# 테마
theme: light                    # dark | light

# 색상 (hex) — 포트폴리오(luma3-portfolio.vercel.app) 색상 시스템 기반
colors:
  background_primary:   "#FFFFFF"   # 메인 배경
  background_secondary: "#F8FAFC"   # 보조 배경 (slate-50)
  background_card:      "#F1F5F9"   # 카드 배경 (slate-100)
  accent_1: "#2563EB"               # 강조색 1 (blue-600)
  accent_2: "#1E3A8A"               # 강조색 2 (blue-900)
  accent_light: "#EFF6FF"           # 강조 배경 (blue-50)
  text_primary:   "#1E293B"         # 본문 (slate-800)
  text_secondary: "#475569"         # 서브 (slate-600)
  text_muted:     "#94A3B8"         # 뮤트 (slate-400)
  border:         "#E2E8F0"         # 구분선 (slate-200)

# 타이포그래피
font:
  family: "Inter"                 # Google Fonts 이름
  weights: [300, 400, 600, 700, 900]

# 슬라이드 크기
slide:
  width:  1280
  height: 720

# 렌더 옵션
render:
  wait_ms: 2000                   # 폰트 로딩 대기 시간 (ms)
  png_per_slide: false            # true면 슬라이드별 PNG도 저장
  cleanup_html: true              # 렌더 후 HTML 임시 파일 제거
  cleanup_js:   true              # 렌더 후 JS 스크립트 제거

# 디자인 규칙 (Claude가 HTML 생성 시 참조)
design_rules:
  no_grid_background: true        # 격자 배경 패턴 사용 금지
  title_slide_deco: glow          # 타이틀 슬라이드 장식: glow | none
  card_style: bordered            # 카드 스타일: bordered | shadowed | flat
  text_wrap_balance: true         # h1~h3에 text-wrap:balance 적용 (자동 균형 줄바꿈)
  word_break: keep-all            # 한국어 어절 단위 줄바꿈
  no_manual_linebreaks: true      # <br> 수동 줄바꿈 금지 — CSS로만 제어
  no_emoji: true                  # 이모지 금지, SVG 아이콘 사용

  # ── 다크 테마 색상 대비 규칙 (AP-17) ────────────────────────────────
  dark_theme_contrast:
    rule: "다크 배경(명도 < 15%)에서 선/텍스트 색상은 배경 대비 40% 이상 밝게"
    line_elements:          # 연결선, 구분선, 테두리
      bad:  "배경과 동일 계열 단색 (예: #1C0F07 배경에 #5C3520 선)"
      good: "rgba(accent, 0.3~0.4) 또는 rgba(255,255,255,0.2) 이상"
    text_muted:             # 보조/설명 텍스트
      bad:  "#8B7355 (배경 #1C0F07 대비 부족)"
      good: "#B8A090 이상 (WCAG AA 근접)"
    text_sub:               # 서브 텍스트
      minimum: "rgba(255,255,255,0.65) 이상 또는 등가 밝기"
    note: "커피/다크 테마 브리프에는 --text-muted를 반드시 #B8A090 이상으로 명시"

# 오버플로 방지 규칙 (검증된 수치)
overflow_guard:
  # 비대칭 레이아웃 right-panel (절대위치 + translateY(-50%)) 리스트 항목
  right_panel_list:
    max_items: 5
    item_padding: "10px 0"        # 5개일 때 — 15px 사용 시 하단 클리핑 발생
    h4_font_size: 14px
    p_font_size:  12px
  # 좁은 컬럼(≤320px) 내 대형 타이틀 — word-break:keep-all 환경에서 orphan 주의
  narrow_column_title:
    max_width_px: 320
    safe_font_size: 44px          # 한글 6자 이하일 때 한 줄 보장
    note: "단어 단위 줄바꿈으로 조사·접속사가 단독 orphan이 되지 않도록 문구 설계"
  # 목차 슬라이드 숫자 일치 확인
  toc_count_match: true           # 제목의 N가지 = 실제 항목 수와 일치시킬 것

# PDF 렌더링 구조 규칙 (Playwright headless 렌더 환경 검증 완료)
pdf_layout_rules:
  # ── 핵심: 슬라이드 높이는 반드시 fixed height ──────────────────
  slide_height: fixed             # min-height 사용 금지 — PDF 렌더에서 flex centering 무력화됨
  slide_css_required: |
    .slide {
      width: 1280px;
      height: 720px;              /* 반드시 fixed — min-height 사용 금지 */
      overflow: hidden;
      position: relative;
    }
  # ── 콘텐츠 영역 수직 중앙 정렬 패턴 ───────────────────────────
  centering_pattern: absolute     # flex height 계산 오류 방지를 위해 absolute + inset 사용
  content_area_css: |
    .body {
      position: absolute;
      top: 5px; left: 0; right: 0; bottom: 0;  /* height = 715px — 명시적 */
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 40px 80px 52px;
    }
  note: "min-height:100vh 또는 height:100vh는 Playwright PDF 렌더에서 의도대로 동작하지 않음"
  # ── @page 선언 ──────────────────────────────────────────────────
  page_rule_required: true        # HTML head에 반드시 포함
  page_rule_css: "@page { size: 1280px 720px; margin: 0; }"
  # ── 이모지 (::before content 포함) ─────────────────────────────
  no_css_content_emoji: true      # CSS content: '🐕' 등 pseudo-element 이모지도 금지
                                  # → 반드시 inline SVG로 대체

# 레이아웃 다양성 규칙 (슬라이드 단조로움 방지)
layout_variety:
  rule: "같은 포맷을 연속 2슬라이드 이상 반복 금지"
  # ── 검증된 레이아웃 패턴 목록 ──────────────────────────────
  patterns:
    two_card:
      desc: "좌우 두 카드 비교 (col-card dog / cat)"
      best_for: "정성적 항목 나열 비교"
      limit: "연속 최대 1회"

    spectrum_rating:
      desc: "속성별 도트 레이팅 (●●●○○) 스펙트럼"
      best_for: "성격·기질·특성 등 정도 차이가 있는 비교"
      css_key: ".spec-row { grid-template-columns: 200px 1fr 200px }"
      dot_size: 18px
      dot_gap: 8px

    care_bar_chart:
      desc: "항목별 가로 바 차트 + 합산 총량 강조"
      best_for: "시간·빈도·부담량 비교 (돌봄, 운동량 등)"
      css_key: ".care-wrap { border: 1.5px solid var(--bd); border-radius: 10px }"
      include_total_row: true   # 하단 합산 행 필수 — 핵심 임팩트

    hero_number_bars:
      desc: "히어로 숫자(56px) + 항목별 바 차트"
      best_for: "비용·수치 비교 — 한 눈에 규모 전달"
      layout: "grid-template-columns: 1fr 1px 1fr"
      hero_font_size: 56px

    icon_card_grid:
      desc: "SVG 아이콘 + 제목 + 설명 카드 (4열 그리드)"
      best_for: "장점·기능·혜택 목록 — 시각적 풍부함"
      grid: "repeat(4, 1fr)"
      icon_size: 26px
      icon_library: "Lucide (stroke 기반 SVG path)"

    asymmetric_panel:
      desc: "좌: 빅텍스트 + 불릿 / 우: 구조화 리스트"
      best_for: "단점·주의사항 — 무게감 있는 대조"
      left_width: 320px

    comparison_table:
      desc: "상황별 적합도 표 (thead 컬러 헤더)"
      best_for: "시나리오별 O/X/조건부 비교"

    big_statement:
      desc: "ghost 텍스트 + 컬러 대형 문구"
      best_for: "핵심 메시지, 감성 마무리 슬라이드"

    three_split_verdict:
      desc: "3분할 결론 (좌:A조건 / 중:핵심문구 / 우:B조건)"
      best_for: "최종 결론, 권장사항 정리"

    # ── NEW 다양성 확장 레이아웃 (2026-03-06 추가) ──────────────
    magazine_split:
      desc: "60/40 비대칭 분할 — 좌: 큰 제목+설명 블록 / 우: 핵심 포인트 스택"
      best_for: "섹션 소개, 콘셉트 설명 — 임팩트 있는 텍스트 중심"
      structure: "grid-template-columns: 3fr 2fr, gap:0, 좌패널:accent배경, 우패널:흰배경"
      css_key: |
        .mag-left  { background:var(--accent); display:flex; flex-direction:column; justify-content:center; padding:60px 56px; }
        .mag-right { display:flex; flex-direction:column; justify-content:center; padding:60px 48px; gap:20px; }
      limit: "연속 최대 1회"

    bento_grid:
      desc: "벤토박스 — 크기 다른 카드들의 혼합 그리드 (1x2 + 1x1 + 1x1 등)"
      best_for: "여러 요소를 동시에 보여줄 때 — 특징/속성 4~6개 비대칭 배치"
      structure: "CSS grid-template-areas로 크기 혼합, 일부 카드는 2열 또는 2행 span"
      css_key: |
        .bento { display:grid; grid-template-columns: repeat(3,1fr); grid-template-rows: repeat(2,1fr); gap:14px; flex:1; min-height:0; }
        .bento-wide { grid-column: span 2; }   /* 2칸 짜리 */
        .bento-tall { grid-row: span 2; }       /* 2행 짜리 */
      limit: "연속 최대 1회"

    quote_spotlight:
      desc: "대형 인용구 중앙 배치 + 하단 출처 + 배경 장식 (원형 또는 라인)"
      best_for: "핵심 문구 강조, 인터뷰/통계 인용, 챕터 전환 슬라이드"
      structure: "중앙 정렬, 인용부호(큰따옴표 SVG) + 대형 텍스트 + 출처줄"
      css_key: |
        .quote-wrap { display:flex; flex-direction:column; align-items:center; justify-content:center; flex:1; min-height:0; text-align:center; padding:0 100px; }
        .quote-mark { font-size:80px; color:var(--accent); opacity:0.4; line-height:0.8; }
        .quote-text { font-size:26px; font-weight:700; line-height:1.5; }
        .quote-src  { font-size:13px; color:var(--text-muted); margin-top:20px; }
      limit: "연속 최대 1회"

    flow_arrows:
      desc: "좌→우 흐름도 — 단계/프로세스 박스 + 화살표 연결"
      best_for: "제작 과정, 의사결정 흐름, 영향 관계 4~5단계"
      structure: "display:flex, 각 단계 박스 + 화살표(→) 사이에 배치"
      css_key: |
        .flow-row { display:flex; align-items:center; justify-content:center; gap:0; flex:1; min-height:0; padding:0 60px; }
        .flow-box { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:28px 20px; border-radius:12px; background:var(--surface); min-height:120px; text-align:center; }
        .flow-arrow { font-size:24px; color:var(--accent); padding:0 12px; flex-shrink:0; }
      limit: "연속 최대 1회"

    stat_trio:
      desc: "3개 대형 수치 나란히 — 각각 숫자+단위+설명"
      best_for: "핵심 통계 3개 동시 강조 — 수치 임팩트 슬라이드"
      structure: "3열 균등, 각 셀에 hero숫자(64px+) + 단위(20px) + 설명줄"
      css_key: |
        .trio { display:grid; grid-template-columns:repeat(3,1fr); gap:28px; flex:1; min-height:0; align-content:center; }
        .trio-item { display:flex; flex-direction:column; align-items:center; justify-content:center; padding:36px 24px; border-radius:16px; background:var(--surface); text-align:center; }
        .trio-num { font-size:64px; font-weight:800; color:var(--accent); line-height:1; }
        .trio-unit{ font-size:18px; font-weight:600; color:var(--text-muted); }
        .trio-desc{ font-size:13px; color:var(--text-muted); margin-top:10px; line-height:1.5; }
      limit: "연속 최대 1회"

    zigzag_rows:
      desc: "좌우 번갈아 배치 — (아이콘/번호+제목+설명) 2~3행"
      best_for: "단계별 설명, 대비 항목 — 텍스트+시각 균형"
      structure: "각 행은 50/50 또는 40/60 분할, 홀수행: 텍스트left-아이콘right, 짝수행: 반전"
      css_key: |
        .zigzag { display:flex; flex-direction:column; gap:20px; flex:1; min-height:0; justify-content:center; }
        .zz-row  { display:grid; grid-template-columns:1fr 1fr; gap:28px; align-items:center; }
        .zz-row.reverse { direction: rtl; }
        .zz-row.reverse > * { direction: ltr; }
        .zz-icon { display:flex; align-items:center; justify-content:center; font-size:48px; }
      limit: "연속 최대 1회"

    assertion_evidence:
      desc: "McKinsey 스타일 — 슬라이드 제목이 완전한 선언문 + 본문은 시각적 증거(차트/그래프)만"
      best_for: "데이터 기반 발표, 컨설팅 덱, 경영진 보고 — '결론 먼저' 구조"
      structure: "제목 영역(강조선 하단) + 본문 전체가 하나의 시각적 증거 블록"
      css_key: |
        .slide-header { border-bottom:3px solid var(--accent); padding:28px 80px 20px; }
        .slide-title  { font-size:22px; font-weight:700; word-break:keep-all; }
        .evidence-body { display:flex; align-items:center; justify-content:center; flex:1; min-height:0; padding:32px 80px 48px; }
      limit: "연속 최대 1회"
      note: "제목은 반드시 완전한 주장 문장(assertion)이어야 함. '~현황' 같은 주제어 금지"

  # ── 슬라이드 구성 시 레이아웃 배분 가이드 ─────────────────
  assignment_guide: |
    9슬라이드 기준 권장 배분 (기본):
    - S1 : title (3-split 또는 magazine_split)
    - S2 : icon_card_grid 또는 bento_grid
    - S3 : spectrum_rating 또는 comparison_table
    - S4 : care_bar_chart 또는 flow_arrows
    - S5 : hero_number_bars 또는 stat_trio
    - S6 : asymmetric_panel 또는 zigzag_rows
    - S7 : quote_spotlight 또는 big_statement
    - S8 : comparison_table 또는 two_card
    - S9 : three_split_verdict 또는 big_statement

    다양성 원칙:
    - 연속 같은 레이아웃 금지
    - Pattern C 계열(full-bleed): 최소 2슬라이드
    - 새 레이아웃(bento/magazine/flow 등): 9슬라이드당 최소 2개 사용
    - 통계/수치 슬라이드: stat_trio 또는 hero_number_bars 1개 이상

# SVG 캐릭터 일러스트 (inline SVG, 외부 의존성 없음)
svg_illustrations:
  note: "이모지 대체 캐릭터 일러스트 — PDF에 완벽 임베드"
  dog:
    viewBox: "0 0 130 152"
    color_fill: "#FCD34D"      # --dog-m
    color_stroke: "#F59E0B"    # --dog
    color_detail: "#92400E"    # --dog-d
    sizes:
      large:  "width=126 height=148"   # 타이틀 패널
      medium: "width=88  height=102"   # 결론 패널
      small:  "width=72  height=84"    # 카드 내부
  cat:
    viewBox: "0 0 130 152"
    color_fill: "#EDE9FE"      # --cat-l
    color_stroke: "#C4B5FD"    # --cat-m
    color_detail: "#4C1D95"    # --cat-d
    sizes:
      large:  "width=126 height=148"
      medium: "width=88  height=102"
      small:  "width=72  height=84"
  placement:
    - "타이틀 슬라이드 각 패널 하단 (large)"
    - "추천 유형 카드 상단 (small)"
    - "결론 패널 상단 (medium)"
    - "빅 스테이트먼트 우하단 데코 (opacity: 0.18)"

# ── HTML 레이아웃 패턴 (Playwright 렌더 검증 기반) ────────────────────
# 슬라이드 내부 레이아웃을 구성할 때 반드시 아래 3가지 패턴 중 하나를 선택해 사용.
# 패턴 혼용 금지. 선택 기준은 콘텐츠 구조에 따라 결정.
html_layout_patterns:

  pattern_a:
    name: "헤더 + 자연 높이 콘텐츠"
    when: "badge + title + sub + 카드그리드/테이블/리스트처럼 자연 높이를 가진 콘텐츠"
    body_css: |
      /* 콘텐츠가 충분히 많을 때 (카드 4개+, 테이블 6행+, 리스트 8항목+) */
      .body {
        position: absolute; top: 5px; left: 0; right: 0; bottom: 0;
        display: flex; flex-direction: column; justify-content: center;
        padding: 40px 80px 52px;
      }

      /* ⚠️ 콘텐츠가 짧을 때 (카드 1~3개, 도트 5속성 이하, 테이블 5행 이하) → AP-10 참조 */
      .body {
        position: absolute; top: 5px; left: 0; right: 0; bottom: 0;
        display: flex; flex-direction: column; justify-content: flex-start;
        padding: 80px 80px 52px;   /* padding-top 80px으로 상단 여백 통제 */
      }
    child_rule: "자식 요소에 height:100% 또는 flex:1 사용 금지 — 자연 높이로만"
    content_height_rule: "AP-10 참조 — 짧은 콘텐츠(60% 이하)엔 justify-content:flex-start + padding-top:80px"
    examples: ["icon_card_grid", "comparison_table", "two_card", "spectrum_rating"]
    # ── AP-11 반복 재발 방지 — 카드 그리드 필수 CSS (복붙 필수) ──────────
    required_card_grid_css: |
      /* ⚠️ Pattern A 카드 그리드 — 아래 블록 반드시 포함 (AP-11, AP-15) */
      .card-grid {
        display: grid;
        /* AP-15: 카드 수에 맞는 열 수 */
        /* 4카드 → repeat(4,1fr)  6카드 → repeat(3,1fr)  8카드 → repeat(4,1fr) */
        grid-template-columns: repeat(N, 1fr);
        grid-template-rows: repeat(M, 1fr);   /* 행 수 명시 */
        gap: 20px;
        flex: 1;                  /* ← AP-11 필수 */
        min-height: 0;            /* ← AP-11 필수 */
        align-content: stretch;   /* ← 행 높이 균등 배분 — 이게 없으면 하단 공백 */
      }
      .card {
        display: flex;
        flex-direction: column;
        padding: 24px 28px;
        /* 카드 내부는 flex-start — 억지로 stretch하지 않음 */
      }

  pattern_b:
    name: "헤더 고정 + 콘텐츠 fill"
    when: "비대칭 레이아웃·바차트처럼 남은 공간을 채워야 하는 콘텐츠"
    body_css: |
      .body {
        position: absolute; top: 5px; left: 0; right: 0; bottom: 0;
        display: flex; flex-direction: column; justify-content: flex-start;
        padding: 40px 80px 52px;
      }
    content_css: |
      .content-fill {
        flex: 1;
        min-height: 0;   /* 반드시 포함 — flex shrink 보장 */
        margin-top: 24px;
      }
    child_rule: "콘텐츠 wrapper에 flex:1 + min-height:0 사용. height:100% 절대 금지."
    examples: ["asymmetric_panel", "hero_number_bars", "care_bar_chart"]

  pattern_c:
    name: "full-bleed 분할 (body 없음)"
    when: "좌우 또는 상하 풀블리드 패널 분할 — .body wrapper 사용 안 함"
    structure_css: |
      /* 직접 position:absolute 또는 CSS grid로 슬라이드 전체 분할 */
      .panel-left  { position: absolute; top:0; left:0; width:35%; height:100%; }
      .panel-right { position: absolute; top:0; left:35%; right:0; height:100%; }
    child_rule: "패널 내부에서 다시 flex centering 적용. .body 없이 직접 absolute 사용."
    examples: ["title_left_panel", "right_accent_panel", "three_split_verdict", "full_accent_bg"]
    # ── AP-08 반복 재발 방지 — 필수 CSS 블록 (복붙 필수) ──────────────
    required_panel_css: |
      /* ⚠️ Pattern C 패널 — 아래 블록을 모든 패널에 반드시 포함 (AP-08) */
      .panel-ANY {
        position: absolute;
        top: 0; height: 100%;
        display: flex;               /* ← 필수 */
        flex-direction: column;      /* ← 필수 */
        justify-content: center;     /* ← 필수 — 이게 없으면 상단 쏠림 */
        padding: 60px 52px;          /* 최소 52px 이상 */
      }
    post_generation_grep: |
      # 생성 완료 후 반드시 실행:
      # Pattern C 패널 수 N개 → display:flex 출현 횟수 ≥ N 확인
      grep -c "display:flex" <html_file>
      grep -c "justify-content:center" <html_file>
      # 두 수치가 패널 수보다 작으면 누락 → 수정 후 재확인

  pattern_d:
    name: "타임라인 (수평 지그재그)"
    when: "연도별 사건 나열 — 역사/프로세스/로드맵 슬라이드"
    structure: |
      .body (Pattern B 방식: flex-start + padding-top:60px)
        └── .timeline-wrap (flex:1; min-height:0; display:flex; flex-direction:column; justify-content:center)
              └── .timeline-row (display:flex; align-items:center)
                    ├── .event (flex:1) — 홀수: 텍스트 위 / 짝수: 텍스트 아래
                    ├── .node (원형, 22px)
                    ├── .line (flex:1, 2px)
                    └── ... 반복
    required_css: |
      /* ── 타임라인 필수 CSS (AP-17, AP-18 포함) ── */
      .timeline-wrap {
        flex: 1; min-height: 0;
        display: flex; flex-direction: column; justify-content: center;
      }
      .timeline-row {
        display: flex; align-items: center;
        padding: 0 60px;
      }
      /* AP-17: 연결선은 배경 대비 40% 이상 밝게 */
      .timeline-line {
        flex: 1; height: 2px;
        background: rgba(var(--accent-rgb, 212,160,82), 0.35);
      }
      /* AP-18: 노드는 모두 원형, 크기로만 강조 */
      .node {
        width: 22px; height: 22px; border-radius: 50%;
        background: var(--accent); flex-shrink: 0;
      }
      .node.highlight {
        width: 28px; height: 28px;
        border: 3px solid #fff;
        box-shadow: 0 0 0 3px var(--accent);
      }
      /* AP-17: 텍스트 최소 가독성 — 다크 배경 */
      .event-title { color: var(--text); font-size: 13px; font-weight: 600; }
      .event-desc  { color: var(--text-muted-light, #B8A090); font-size: 11px; }
      .event-year  { color: var(--accent); font-size: 13px; font-weight: 700; }
    layout_note: |
      홀수 이벤트: 노드 위에 연도·제목·설명 표시
      짝수 이벤트: 노드 아래에 연도·제목·설명 표시
      → 교대 배치로 시각적 리듬감 생성
    node_count_limit: 8   # 8개 초과 시 가독성 저하, 분리 권장
    examples: ["korean_coffee_timeline", "company_history", "roadmap"]

# ── HTML 안티패턴 (검증된 버그 원인) ─────────────────────────────────
# 아래 패턴은 Playwright PDF 렌더에서 레이아웃 깨짐을 유발함. 절대 사용 금지.
html_anti_patterns:
  - id: AP-01
    pattern: "flex column 자식에 height:100%"
    symptom: "콘텐츠가 상단에 붙거나 centering 무력화"
    fix: "flex:1; min-height:0 으로 대체 (Pattern B)"
    example_bad:  ".asym { height: 100%; }"
    example_good: ".asym { flex: 1; min-height: 0; }"

  - id: AP-02
    pattern: "콘텐츠 wrapper에 고정 height (e.g. height:380px)"
    symptom: "badge/title과 콘텐츠 사이에 의도치 않은 gap 발생, 하단 공백"
    fix: "고정 height 제거, flex:1 + min-height:0 사용"
    example_bad:  ".cost-wrap { height: 380px; }"
    example_good: ".cost-wrap { flex: 1; min-height: 0; }"

  - id: AP-03
    pattern: "justify-content:center 인 body 안에 flex:1 자식 공존"
    symptom: "flex:1 자식이 전체 공간을 점유 → justify-content 무력화"
    fix: "Pattern B로 전환: body를 flex-start로, 콘텐츠에 flex:1"

  - id: AP-04
    pattern: "슬라이드 전체 레이아웃에 min-height 또는 height:100vh"
    symptom: "Playwright headless PDF에서 슬라이드 높이 계산 오류"
    fix: ".slide { height: 720px } 고정 (pdf_layout_rules 참조)"

  - id: AP-05
    pattern: "좁은 컬럼(≤220px) 안에 긴 영문 텍스트"
    symptom: "줄바꿈 발생, 카드 높이 불균형"
    fix: "font-size 11px로 줄이거나 컬럼 폭 확장, 또는 word-break:break-all"

  - id: AP-06
    pattern: "바 차트에서 강조 항목에 width 값을 임의로 지정"
    symptom: "강조 항목(예: 반응속도 9.25)의 바가 더 높은 값 항목(체력소모 14.00)보다 길게 표시 — 데이터 왜곡"
    fix: "모든 바 width는 반드시 (value / max_value * 100)% 공식으로 계산. 강조는 background-color/font-weight만으로 표현."
    example_bad:  ".bar-highlight { width: 95%; }  /* 9.25점인데 95% */"
    example_good: "width: calc(9.25 / 20 * 100%)  /* 46.25% */ — 강조는 color만 변경"
    note: "max_value는 해당 슬라이드 내 가장 높은 값 기준. 타 슬라이드와 비교 시 전체 데이터셋 max 사용."

  - id: AP-07
    pattern: "컬러 오버라이드 시 파스텔/연한 톤 배경 사용"
    symptom: "덱 내 특정 슬라이드만 색감이 희미해 전체 일관성 파괴 (예: S1 진초록 vs S6 연민트)"
    fix: "컬러 오버라이드는 해당 스포츠/브랜드의 원색 그대로 사용. 연하게 쓰려면 텍스트 색만 lighten."
    example_bad:  "background: #d4edda  /* 연한 민트 — 축구색 희석 */"
    example_good: "background: #009932  /* 원색 유지 */ or 배경 흰색 + 텍스트/강조요소만 원색"

  - id: AP-08
    pattern: "Pattern C 패널(position:absolute 분할) 내부에 flex centering 미적용"
    symptom: "패널 내 콘텐츠가 상단에 쏠리고 하단 절반이 빈 공간 — full-bleed 패널에서 가장 흔한 버그"
    fix: "패널 내부 래퍼에 반드시 display:flex; flex-direction:column; justify-content:center 적용"
    example_bad: |
      .panel-left { position:absolute; top:0; left:0; width:35%; height:100%; padding:48px; }
      /* 내부 flex 없음 → 콘텐츠 상단 고정 */
    example_good: |
      .panel-left { position:absolute; top:0; left:0; width:35%; height:100%;
                    display:flex; flex-direction:column; justify-content:center; padding:48px 40px; }
    applies_to: ["Pattern C", "title_left_panel", "three_split_verdict", "any full-bleed panel"]
    note: "패널 내부에서 다시 콘텐츠를 상단에 정렬하려면 justify-content:flex-start 명시. 기본값은 center."
    # ── CHECKLIST: Pattern C 슬라이드 생성 전 필수 확인 ──────────────────
    checklist: |
      [ ] 모든 position:absolute 패널에 display:flex; flex-direction:column; justify-content:center 있는가?
      [ ] 패널이 3개 이상(three_split_verdict)이면 각각 개별 확인했는가?
      [ ] 패널 내 padding은 충분한가? (최소 44px 이상 권장 — IR Deck S09 검증: 32px은 여전히 쏠림)
      [ ] 패널 내부 콘텐츠에 height:100% 또는 position:absolute 다시 사용하진 않았는가?
      [ ] 배지 요소에 display:inline-block 또는 align-self:flex-start 적용했는가? (AP-12)
    real_case: |
      IR Deck S09 (사업 사례, 3분할): 모든 패널 상단 40%가 공백 → flex centering 미적용 확인됨.
      LLM이 position:absolute 패널을 생성할 때 flex 내부 선언을 누락하는 경향 강함.
      생성 후 반드시 'display:flex' 키워드 grep으로 패널 수 ×1 이상인지 확인 권장.

  - id: AP-09
    pattern: "사례박스·하단 요소·인용구를 position:absolute bottom 또는 margin-top:auto로 하단 고정"
    symptom: |
      카드 내부 인용구 / 사례박스가 하단에 고정되고, 위쪽 콘텐츠와 사이에 거대한 빈 공간 발생.
      카드 브리프에 '인용:' 항목이 있으면 LLM이 margin-top:auto 또는 absolute bottom으로 구현하는 경향.
    fix: "인용구·사례박스는 flex 흐름 안에 두고 margin-top:16~24px으로 자연 배치. margin-top:auto 절대 금지."
    example_bad: |
      .quote { margin-top: auto; }                          /* 카드 내 인용구 하단 고정 */
      .case-box { position: absolute; bottom: 32px; }       /* absolute 하단 고정 */
    example_good: |
      /* flex column 카드 내에서 자연 흐름 */
      .card-body  { display:flex; flex-direction:column; padding:20px 24px; }
      .card-text  { margin-bottom: 12px; }
      .card-quote { margin-top: 16px; font-style:italic; color: var(--accent-1); font-size:13px; }
      /* margin-top:auto 사용 금지 — 빈 공간이 생기면 카드 패딩을 늘릴 것 */
    applies_to: ["카드 내부 인용구", "사례박스", "any bottom-anchored element inside a flex column"]

  - id: AP-10
    pattern: "Pattern A/B 슬라이드에서 콘텐츠 총 높이가 슬라이드의 60% 이하인데 justify-content:center 사용"
    symptom: |
      헤더(badge+title+sub) + 콘텐츠 블록의 합산 높이가 짧을 때, justify-content:center가
      콘텐츠를 슬라이드 수직 중간에 배치 — 시각적으로 상단 25~30% + 하단 25~30%가 빈 공간처럼 보임.
      특히 카드 2~3개, 도트 테이블 5행 이하, 짧은 항목 리스트 슬라이드에서 두드러짐.
    root_cause: |
      .body { height: 715px (전체) - padding 92px = 623px 가용 }
      콘텐츠 총 높이 = 예: 280px → center 배치 시 상하 171px씩 여백
      → 헤더 위 공간이 시각적으로 과도하게 보임
    fix: |
      콘텐츠 높이 예상치가 슬라이드의 60% 이하(약 430px 이하)인 경우:
        justify-content: flex-start + padding-top: 80px 사용 (center 금지)
      콘텐츠가 충분히 많을 때(카드 4개+, 테이블 6행+, 높이 430px 이상 예상):
        justify-content: center 유지 가능
    example_bad: |
      /* 카드 2개짜리 슬라이드인데 center 사용 → 시각적 상하 공백 */
      .body { justify-content: center; padding: 40px 80px 52px; }
    example_good: |
      /* 콘텐츠가 짧은 슬라이드 → flex-start + padding-top으로 상단 여백 통제 */
      .body { justify-content: flex-start; padding: 80px 80px 52px; }
    threshold:
      use_center: "카드 4개 이상 / 테이블 6행+ / 리스트 8항목+ (슬라이드 높이 60%+ 채울 때)"
      use_flex_start: "카드 1~3개 / 테이블 5행 이하 / 도트 5속성 이하 / 짧은 리스트"
    applies_to: ["Pattern A", "Pattern B (fill 영역이 아닌 헤더 영역)"]
    note: "Pattern B에서 .content-fill { flex:1 }이 있는 경우엔 AP-10 해당 없음 — fill이 공간을 채움"

  - id: AP-11
    pattern: "Pattern B content-fill 내부의 카드 그리드/리스트 컨테이너에 flex:1 미적용"
    symptom: |
      content-fill이 flex:1로 공간을 차지해도, 그 안의 카드 그리드가 자연 높이만 갖고
      나머지 공간이 빈 공간으로 낭비됨. 카드들이 슬라이드 상단 절반에만 보이고 하단 절반 비어있음.
    root_cause: |
      .content-fill { display:flex; flex-direction:column }  ← flex container
      .card-grid { display:grid; ... }  ← flex:1 없음 → 자연 높이만 차지
      → content-fill의 나머지 공간 낭비
    fix: |
      카드 그리드/리스트 컨테이너에 반드시 flex:1; min-height:0 추가:
        .card-grid { display:grid; ...; flex:1; min-height:0; }
      카드 자체에 align-self:stretch는 grid에서 자동 적용되므로 별도 불필요
    example_bad: |
      .content-fill { flex:1; min-height:0; display:flex; flex-direction:column; }
      .card-grid { display:grid; grid-template-columns: 1fr 1fr 1fr; gap:20px; }
      /* 카드 그리드가 자연 높이만 → 하단 공백 */
    example_good: |
      .content-fill { flex:1; min-height:0; display:flex; flex-direction:column; }
      .card-grid { display:grid; grid-template-columns: 1fr 1fr 1fr; gap:20px;
                   flex:1; min-height:0; }  /* ← 반드시 추가 */
    applies_to: ["Pattern B", "모든 content-fill 직계 자식 컨테이너"]
    note: "카드 내부 텍스트가 상단에 쏠리더라도 카드가 빈 공간을 차지하는 게 하단 공백보다 훨씬 낫다"

  - id: AP-13
    pattern: "한국어 제목/본문에 word-break:keep-all 미적용 → 어절 중간에서 줄바꿈 발생"
    symptom: |
      '만드는 의사결정' 같은 어절이 '만' / '드는 의사결정'으로 쪼개지거나,
      조사·접속사가 단독 줄에 orphan으로 남음.
      slides_config.yaml design_rules에 word_break: keep-all이 있어도 LLM이 CSS에 반영하지 않는 경향.
    fix: "전역 CSS에 아래 블록을 반드시 포함. 브리프에 코드 형태로 명시해야 적용됨."
    required_css: |
      /* ── 한국어 어절 단위 줄바꿈 (필수) ── */
      h1, h2, h3, .title, .headline, .slide-title {
        word-break: keep-all;
        overflow-wrap: break-word;
        text-wrap: balance;          /* 균형 줄바꿈 — 최신 Chromium 지원 */
      }
      p, li, .desc, .sub, .card-text, .badge-text {
        word-break: keep-all;
        overflow-wrap: break-word;
      }
    note: |
      text-wrap:balance는 Playwright Chromium에서 지원됨.
      word-break:keep-all만으로도 어절 중간 줄바꿈은 방지 가능.
      font-size가 큰 제목(44px+)은 overflow-wrap:break-word도 함께 필수.
    font_size_limit: |
      ⚠️ CJK 헤드라인 font-size 상한 — 컨테이너 가용 폭 기준:
        전체 폭(1280px) 패널:           최대 52px  (≤15자), 44px (16~22자), 38px (23자+)
        60% 우측 패널(가용 ~652px):     최대 48px  (≤14자), 42px (15~20자), 36px (21자+)
        50% 패널(가용 ~540px):          최대 44px  (≤12자), 38px (13~18자), 32px (19자+)
        33% 패널(가용 ~340px):          최대 32px  (≤10자), 26px (11자+)
      → 브리프에 font-size 지정 시 "자수 × px ≤ 가용 폭 × 0.9" 조건 사전 검증 필수.
      → 초과 시 font-size를 줄일 것 (문구 수정 금지).
    real_case: |
      Planby IR S1: "건설 산업이 AI를 쓸 수 있게 만드는 의사결정 인프라" (22자)
        60% 패널 가용폭 652px / 48px = 한 줄 max ~13자 → 두 줄 불가피.
        keep-all 적용 후 "있게 / 만드는" 분리 — 의미단위("있게 만드는") 파괴.
        fix: font-size 42px → "있게 만드는 의사결정 인프라" 두 번째 줄 보장.
    applies_to: ["모든 슬라이드 전역 CSS", "특히 커버·섹션 제목 슬라이드"]

  - id: AP-17
    pattern: "다크 배경에서 연결선·구분선에 배경과 유사한 색상 사용 → 선이 거의 안 보임"
    symptom: |
      타임라인 연결선, 카드 구분선, 세로 구분바 등이 다크 배경(#0F172A, #1C0F07 등)에 묻혀
      시각적으로 존재감이 없어짐. 사용자가 '선이 안 보인다'고 지적.
      특히 커피 테마처럼 다크 브라운 계열에서 --border(#5C3520)는 배경(#1C0F07)과 대비 매우 낮음.
    fix: |
      다크 배경 슬라이드에서 연결선·구분선은 반드시 배경 대비 40% 이상 밝은 색상 사용:
        - 다크 배경(#0F172A~#1C0F07) + 연결선: opacity:0.5 이상의 밝은 색 (예: rgba(255,255,255,0.25) 이상)
        - 타임라인 연결선은 --accent 계열 또는 --text-muted보다 밝은 색 권장
        - 최소 기준: 배경 명도 vs 선 명도 차이 ≥ 30%
    example_bad: |
      /* 배경 #1C0F07, 연결선 #5C3520 → 대비 부족 */
      .timeline-line { background: var(--border); /* #5C3520 */ }
    example_good: |
      /* 배경 #1C0F07, 연결선 rgba(212,160,82,0.35) → 골든 반투명으로 대비 확보 */
      .timeline-line { background: rgba(212, 160, 82, 0.35); }
    applies_to: ["타임라인 연결선", "카드 구분선", "세로 divider", "다크 배경 모든 선 요소"]
    note: "text-muted 색상도 동일 원칙. 다크 배경에서 가독성 최소 기준: 배경 대비 WCAG AA 4.5:1 목표"

  - id: AP-18
    pattern: "타임라인 노드 모양 혼용 (원/사각/삼각) → 의미 불명확, 시각적 혼란"
    symptom: |
      타임라인 노드를 각 이벤트별로 다른 모양(circle, square, triangle 등)으로 구현 시
      모양의 의미 차이가 없어 오히려 혼란. 사용자 입장에서 왜 다른 모양인지 알 수 없음.
    fix: |
      모든 타임라인 노드는 동일한 모양(원 권장)으로 통일.
      강조가 필요한 노드는 크기(24px→32px), 테두리 두께, 또는 색상으로만 차별화.
        - 기본 노드: 원 20px, --accent 배경, --bg 테두리 2px
        - 강조 노드: 원 28px, --accent 배경, 흰 테두리 3px
    example_bad: |
      <!-- 1890: circle, 1927: square, 1976: square, 2010s: triangle -->
    example_good: |
      <!-- 모두 circle, 핵심 이벤트만 크기 28px + 흰 ring으로 강조 -->
    applies_to: ["타임라인 슬라이드", "프로세스 다이어그램"]

  - id: AP-15
    pattern: "6개 카드를 4열 grid에 배치 → 4+2 불균형 행 발생, 2행이 하단에 치우침"
    symptom: |
      grid-template-columns: repeat(4, 1fr) 에 6개 카드를 넣으면 1행 4개, 2행 2개.
      2행 카드 2개가 왼쪽에 치우치고 우측 2칸 빈 공간 + 하단 전체 공백 발생.
    fix: |
      카드 수에 맞는 열 수를 선택할 것:
        4개 → repeat(4, 1fr)  (1행)
        6개 → repeat(3, 1fr)  (2행 균등)
        8개 → repeat(4, 1fr)  (2행 균등)
      + grid-template-rows: 1fr 1fr 명시 → 행 높이 균등 배분
      + .card-grid { flex:1; min-height:0; align-content:stretch; } (AP-11)
    example_bad: |
      /* 6카드인데 4열 → 4+2 불균형 */
      .card-grid { display:grid; grid-template-columns: repeat(4, 1fr); }
    example_good: |
      /* 6카드 → 3열 */
      .card-grid { display:grid; grid-template-columns: repeat(3, 1fr);
                   grid-template-rows: 1fr 1fr; flex:1; min-height:0; align-content:stretch; }
    applies_to: ["Pattern A/B icon_card_grid", "카드 수 4개 이외 모든 카드 그리드"]
    note: "브리프에 카드 수가 명시되면 열 수를 카드 수 ÷ 2 로 계산. 홀수면 ceil 처리."

  - id: AP-16
    pattern: "big_statement 슬라이드에서 ghost text를 일반 flow에 배치 → 공간 차지 + 메인 텍스트 하단 쏠림"
    symptom: |
      ghost 텍스트('KNIFE VS BAT' 등)를 <div class='ghost'>로 flex flow 안에 두면
      ghost 텍스트 높이만큼 공간을 차지 → 메인 메시지가 하단으로 밀림.
      결과: 메인 카피가 슬라이드 하단 1/3에만 표시됨.
    fix: |
      ghost text는 반드시 position:absolute 배경 레이어로 처리:
        .ghost {
          position: absolute;
          top: 20px; left: 60px;
          font-size: 140px; font-weight: 900;
          color: var(--text); opacity: 0.05;
          z-index: 0; pointer-events: none;
          white-space: nowrap;
        }
      메인 콘텐츠 .body는 z-index:1 로 ghost 위에 오버레이
    example_bad: |
      <div class="body">
        <div class="ghost">KNIFE VS BAT</div>  <!-- flow에 포함 → 공간 차지 -->
        <h1>무기는 상황을 탄다</h1>
      </div>
    example_good: |
      <div class="slide">
        <div class="ghost">KNIFE VS BAT</div>  <!-- absolute, z-index:0 -->
        <div class="body" style="z-index:1">   <!-- 메인 콘텐츠 오버레이 -->
          <h1>무기는 상황을 탄다</h1>
        </div>
      </div>
    applies_to: ["big_statement 슬라이드", "배경 ghost/watermark 텍스트 모든 슬라이드"]
    note: "ghost text는 항상 .slide 직계 자식으로, .body 바깥에 배치"

  - id: AP-14
    pattern: "수직 컬러 강조 바(vertical accent bar)를 position:absolute; top:0 으로 배치 → 헤더 영역 침범 및 상단 과도한 공백"
    symptom: |
      S6/S7처럼 .body 바깥에 position:absolute; left:0; top:0; height:100% 로 배치한 수직 강조 바가
      슬라이드 최상단(0px)부터 시작 → 배지·제목 위 공백이 과도하게 커 보임.
      실제로는 .body padding-top(40~80px) 때문에 배지가 아래에 있어 바와 불일치.
    fix: |
      방법 A (권장): 수직 강조 바를 .body 내부에 flex row 첫 번째 요소로 포함
        .body { flex-direction: row; }
        .accent-bar { width: 4px; background: var(--accent); align-self: stretch; margin-right: 32px; }
        .content-col { flex: 1; display: flex; flex-direction: column; }
      방법 B: absolute 유지 시 top 값을 body padding과 일치시킴
        .accent-bar { position: absolute; left: 40px; top: 40px; bottom: 40px; width: 4px; }
    example_bad: |
      .accent-bar { position: absolute; left: 60px; top: 0; height: 100%; width: 4px; }
      /* top:0 → 슬라이드 최상단에서 시작, 배지와 불일치 */
    example_good: |
      /* .body 내부 flex row로 처리 */
      .body { flex-direction: row; align-items: stretch; padding: 48px 80px; }
      .accent-bar { width: 4px; border-radius: 2px; background: var(--accent); flex-shrink: 0; }
      .content-col { flex: 1; min-width: 0; padding-left: 28px; display: flex; flex-direction: column; justify-content: center; }
    applies_to: ["Pattern A/B에서 좌측 수직 강조 바 사용 슬라이드"]
    note: "수직 바의 시작/끝 위치가 텍스트 블록과 정렬되어야 시각적으로 깔끔함"

  - id: AP-12
    pattern: "배지(badge) 요소에 width 제약 없이 block 렌더링 → 슬라이드 전체 너비로 늘어남"
    symptom: |
      섹션 배지('CONTEXT', 'SOLUTION', 'TEAM' 등)가 텍스트 길이와 무관하게 슬라이드 전체 너비(1280px)를
      채우는 pill 형태로 렌더링됨. 특히 border-radius + border만 지정하고 width를 제한하지 않을 때 발생.
    fix: "배지에 반드시 display:inline-block (또는 width:fit-content) 적용"
    example_bad: |
      .badge {
        border: 1.5px solid var(--accent-1);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 11px;
        /* width 제약 없음 → block 기본값으로 full-width */
      }
    example_good: |
      .badge {
        display: inline-block;           /* ← 반드시 */
        border: 1.5px solid var(--accent-1);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 11px;
        letter-spacing: 0.08em;
        color: var(--accent-1);
        width: fit-content;              /* 추가 보험 */
      }
    applies_to: ["모든 섹션 배지", "pill 형태 레이블", "Pattern A/B/C 공통"]
    note: "부모가 flex column이면 align-self:flex-start 추가도 효과적. 단독 배지는 display:inline-block만으로 충분."

# ── 제안형 슬라이드 표준 구조 ─────────────────────────────────────────
# 여행·기획·제안·비교 등 '무언가를 제안하는' 슬라이드에 사용하는 9슬라이드 기본 구조.
# 내용이 적으면 슬라이드 수 줄여도 무방 (최소 6장).
proposal_template:
  desc: "여행·기획·제안서 등 제안형 슬라이드의 표준 구조"
  total_slides: 9
  layout_pattern: "Pattern A/B/C 혼합 — 연속 동일 레이아웃 금지"
  structure:
    S1:
      role: "타이틀"
      pattern: C
      type: title_left_panel
      content: "주제·부제 + 핵심 포인트 3~4개 아이콘 리스트"
    S2:
      role: "왜 이것인가"
      pattern: A
      type: icon_card_grid
      content: "4가지 선택 이유 — 가장 중요한 Why 슬라이드"
    S3:
      role: "핵심 조건/시즌/배경"
      pattern: B
      type: asymmetric_panel
      content: "좌: 히어로 숫자/키워드 / 우: 3~4개 항목 리스트"
    S4:
      role: "옵션/선택지 비교"
      pattern: A
      type: comparison_table
      content: "3~4개 옵션을 5개 기준으로 비교한 테이블"
    S5:
      role: "이동/절차/방법"
      pattern: C
      type: right_accent_panel
      content: "좌: 단계별 리스트 / 우: 핵심 수치 패널"
    S6:
      role: "추천 2가지"
      pattern: A
      type: two_card
      content: "추천 옵션 A vs B — 각각 특징·태그"
    S7:
      role: "일정/단계"
      pattern: A
      type: timeline
      content: "5열 타임라인 (Day/Step 별 카드)"
      note: "카드 내 텍스트 font-size 11px 이하, 줄바꿈 방지"
    S8:
      role: "비용/수치"
      pattern: B
      type: hero_number_bars
      content: "좌: 총액 히어로 숫자 / 우: 항목별 바 차트"
    S9:
      role: "결론/실행"
      pattern: C
      type: three_split_verdict
      content: "좌: 추천 대상 / 중: 핵심 문구(파란 패널) / 우: 실행 체크리스트"

# ── 슬라이드 브리프 의무 체크리스트 ────────────────────────────────────
# Codex가 HTML 생성을 완료한 직후 반드시 아래 항목을 grep으로 검증해야 함.
# 검증 실패 항목이 있으면 수정 후 재확인. 모두 PASS 후 완료 선언.
brief_checklist:
  description: "HTML 생성 완료 후 Codex 필수 자가검증 항목"
  items:

    - id: CHK-01
      name: "슬라이드 고정 높이"
      grep: 'height: 720px'
      min_count: 1
      failure: "AP-04 — .slide에 height:720px 없음"

    - id: CHK-02
      name: "Pattern C 패널 flex centering"
      description: "position:absolute 패널 수만큼 justify-content:center 출현 확인"
      grep: 'justify-content:\s*center'
      check: "패널 수 ≤ justify-content:center 출현 횟수"
      failure: "AP-08 — 패널에 flex centering 누락"

    - id: CHK-03
      name: "카드 그리드 flex:1"
      grep: 'align-content:\s*stretch'
      min_count_per_grid_slide: 1
      failure: "AP-11 — card-grid에 align-content:stretch 누락"

    - id: CHK-04
      name: "배지 display:inline-block"
      grep: 'display:\s*inline-block'
      min_count: 1
      failure: "AP-12 — 배지에 inline-block 누락"

    - id: CHK-05
      name: "한국어 word-break"
      grep: 'word-break:\s*keep-all'
      min_count: 1
      failure: "AP-13 — word-break:keep-all 전역 미적용"

    - id: CHK-06
      name: "height:100% flex child 금지"
      grep: 'height:\s*100%'
      allowed_contexts: [".panel-", ".slide", "position:absolute 패널"]
      failure: "AP-01 — flex child에 height:100% 사용 금지"

    - id: CHK-07
      name: "타임라인 노드 모양 통일 (타임라인 슬라이드에만 해당)"
      grep: 'border-radius:\s*50%'
      condition: "타임라인 슬라이드 포함 시"
      failure: "AP-18 — 노드에 border-radius:50% 없음"

    - id: CHK-08
      name: "다크 배경 연결선 대비"
      grep: 'rgba'
      condition: "다크 테마 슬라이드 + 선 요소 포함 시"
      failure: "AP-17 — 선 색상에 rgba 반투명 미적용"

  post_checklist_report: |
    생성 완료 후 아래 형식으로 보고:
    CHK-01: PASS/FAIL
    CHK-02: PASS/FAIL (패널 N개, justify-content:center N회)
    CHK-03: PASS/FAIL
    CHK-04: PASS/FAIL
    CHK-05: PASS/FAIL
    CHK-06: PASS/FAIL
    CHK-07: PASS/FAIL (타임라인 해당 없음 시 N/A)
    CHK-08: PASS/FAIL (다크 테마 해당 없음 시 N/A)

# ── AP 빠른 참조표 ───────────────────────────────────────────────────
# 브리프 작성 시 관련 AP 번호를 명시할 것
ap_quick_ref:
  AP-01: "flex child에 height:100% 금지 → flex:1; min-height:0"
  AP-02: "콘텐츠 wrapper 고정 height 금지"
  AP-03: "center body 안에 flex:1 자식 공존 금지"
  AP-04: "슬라이드에 min-height/100vh 금지 → height:720px 고정"
  AP-05: "좁은 컬럼 긴 영문 → font-size 축소 또는 break-all"
  AP-06: "바 너비 = value/max*100% 공식 준수"
  AP-07: "컬러 오버라이드 시 파스텔 금지 → 원색 유지"
  AP-08: "Pattern C 패널에 display:flex + justify-content:center 필수"
  AP-09: "margin-top:auto 하단 고정 금지 → 자연 흐름 배치"
  AP-10: "짧은 콘텐츠에 justify-content:center 금지 → flex-start+padding-top:80px"
  AP-11: "card-grid에 flex:1 + min-height:0 + align-content:stretch 필수"
  AP-12: "배지에 display:inline-block + width:fit-content 필수"
  AP-13: "한국어 word-break:keep-all 전역 CSS 필수"
  AP-14: "수직 강조 바는 body flex-row 내부에 포함"
  AP-15: "카드 수에 맞는 열 수 선택 (6카드→3열, 4카드→4열)"
  AP-16: "ghost/watermark 텍스트는 position:absolute z-index:0 배경 처리"
  AP-17: "다크 배경 선/텍스트는 배경 대비 40% 이상 밝게"
  AP-18: "타임라인 노드 모양 통일 (원형), 크기/색상으로만 강조"
