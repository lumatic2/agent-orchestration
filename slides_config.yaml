# ── 슬라이드 생성 설정 ──────────────────────────────────────────────
# Claude가 슬라이드 HTML을 생성할 때 참조하는 기본값
# 이 파일을 수정하면 다음 세션부터 반영됨

# 출력 경로
# 최종 PDF 저장 위치
output_dir: ~/Desktop

# 테마
theme: dark                     # dark | light

# 색상 (hex)
colors:
  background_primary:   "#1A1A2E"   # 메인 배경
  background_secondary: "#16213E"   # 보조 배경
  accent_1: "#10B981"               # 강조색 1 (Emerald)
  accent_2: "#059669"               # 강조색 2 (Emerald Dark)
  text_primary:   "#FFFFFF"
  text_secondary: "rgba(255,255,255,0.6)"

# 타이포그래피
font:
  family: "Inter"                 # Google Fonts 이름
  weights: [300, 400, 600, 700, 900]

# 슬라이드 크기
slide:
  width:  1280
  height: 720

# 렌더 옵션
render:
  wait_ms: 2000                   # 폰트 로딩 대기 시간 (ms)
  png_per_slide: false            # true면 슬라이드별 PNG도 저장
  cleanup_html: true              # 렌더 후 HTML 임시 파일 제거
  cleanup_js:   true              # 렌더 후 JS 스크립트 제거
