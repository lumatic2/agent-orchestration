# ── 슬라이드 생성 설정 ──────────────────────────────────────────────
# Claude가 슬라이드 HTML을 생성할 때 참조하는 기본값
# 이 파일을 수정하면 다음 세션부터 반영됨

# 출력 경로
# 최종 PDF 저장 위치
output_dir: ~/Desktop

# 테마
theme: light                    # dark | light

# 색상 (hex) — 포트폴리오(luma3-portfolio.vercel.app) 색상 시스템 기반
colors:
  background_primary:   "#FFFFFF"   # 메인 배경
  background_secondary: "#F8FAFC"   # 보조 배경 (slate-50)
  background_card:      "#F1F5F9"   # 카드 배경 (slate-100)
  accent_1: "#2563EB"               # 강조색 1 (blue-600)
  accent_2: "#1E3A8A"               # 강조색 2 (blue-900)
  accent_light: "#EFF6FF"           # 강조 배경 (blue-50)
  text_primary:   "#1E293B"         # 본문 (slate-800)
  text_secondary: "#475569"         # 서브 (slate-600)
  text_muted:     "#94A3B8"         # 뮤트 (slate-400)
  border:         "#E2E8F0"         # 구분선 (slate-200)

# 타이포그래피
font:
  family: "Inter"                 # Google Fonts 이름
  weights: [300, 400, 600, 700, 900]

# 슬라이드 크기
slide:
  width:  1280
  height: 720

# 렌더 옵션
render:
  wait_ms: 2000                   # 폰트 로딩 대기 시간 (ms)
  png_per_slide: false            # true면 슬라이드별 PNG도 저장
  cleanup_html: true              # 렌더 후 HTML 임시 파일 제거
  cleanup_js:   true              # 렌더 후 JS 스크립트 제거

# 디자인 규칙 (Claude가 HTML 생성 시 참조)
design_rules:
  no_grid_background: true        # 격자 배경 패턴 사용 금지
  title_slide_deco: glow          # 타이틀 슬라이드 장식: glow | none
  card_style: bordered            # 카드 스타일: bordered | shadowed | flat
  text_wrap_balance: true         # h1~h3에 text-wrap:balance 적용 (자동 균형 줄바꿈)
  word_break: keep-all            # 한국어 어절 단위 줄바꿈
  no_manual_linebreaks: true      # <br> 수동 줄바꿈 금지 — CSS로만 제어
  no_emoji: true                  # 이모지 금지, SVG 아이콘 사용

# 오버플로 방지 규칙 (검증된 수치)
overflow_guard:
  # 비대칭 레이아웃 right-panel (절대위치 + translateY(-50%)) 리스트 항목
  right_panel_list:
    max_items: 5
    item_padding: "10px 0"        # 5개일 때 — 15px 사용 시 하단 클리핑 발생
    h4_font_size: 14px
    p_font_size:  12px
  # 좁은 컬럼(≤320px) 내 대형 타이틀 — word-break:keep-all 환경에서 orphan 주의
  narrow_column_title:
    max_width_px: 320
    safe_font_size: 44px          # 한글 6자 이하일 때 한 줄 보장
    note: "단어 단위 줄바꿈으로 조사·접속사가 단독 orphan이 되지 않도록 문구 설계"
  # 목차 슬라이드 숫자 일치 확인
  toc_count_match: true           # 제목의 N가지 = 실제 항목 수와 일치시킬 것
