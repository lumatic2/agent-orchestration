name: slides
description: 주제 → Gemini 리서치 → Codex HTML 생성 → PDF 렌더
vars:
  topic: null
  slides: 10
  output: local
steps:
  - id: research
    agent: gemini
    task: "{{topic}} 슬라이드용 리서치. 핵심 포인트 {{slides}}개 추출."
    name: "slides-research-{{topic}}"
  - id: build
    agent: codex
    task: "슬라이드 HTML 생성. 주제: {{topic}}, 슬라이드 수: {{slides}}. 리서치 결과: {{steps.research.result}}"
    name: "slides-build-{{topic}}"
    depends_on: research